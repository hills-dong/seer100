<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#38</span> <span class="prophecy-cat">🔬 科技与通讯</span> <span class="prophecy-year-tag">2030</span></div><div class="prophecy-q">以后最新兴的行业是什么？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2030年以后，会是人工智能与跨行业者的结合，就是精通人工智能开发与编程的各个行业。另外游戏业从2035年进入了另外一个阶段。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#39</span> <span class="prophecy-cat">💬 个人与其他</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">我怎样能找到你？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>不能找到。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#40</span> <span class="prophecy-cat">🌍 地缘政治与战争</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">小康实现了吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>只停留于历史的一个词汇。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#41</span> <span class="prophecy-cat">🌊 气候与自然灾害</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">我们现在做些什么能帮助到以后的我们？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>需要在广阔的内陆找到合适居住的地方。因为极端气候会导致许多城市出现无法生存的情况。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#42</span> <span class="prophecy-cat">🌊 气候与自然灾害</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">南方边境省份能具体点吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>尽量离尼泊尔远一点。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#43</span> <span class="prophecy-cat">🔬 科技与通讯</span> <span class="prophecy-year-tag">2035</span></div><div class="prophecy-q">是否存在全息旅游和全息游戏？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2035年开始出现第一款这样的游戏，在中国。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#44</span> <span class="prophecy-cat">🌊 气候与自然灾害</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">所以海平面升高会导致很多沿海城市消失是吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>还有炎热，地震导致的塌陷。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#45</span> <span class="prophecy-cat">🌊 气候与自然灾害</span> <span class="prophecy-year-tag">2030</span></div><div class="prophecy-q">在未来哪些省份比较宜居？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2030年以后的云南，2048年以后的贵州。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#46</span> <span class="prophecy-cat">🏠 社会与生活</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">人文学科的发展如何？性别平等问题是否有所改变？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>人文倾向于在全球不同文明中找到共荣理论，但仍然失败。在某些国家和地区，歧视女性仍然存在。在另一些地区，女性主义强盛，但也导致混乱。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#47</span> <span class="prophecy-cat">🔬 科技与通讯</span> <span class="prophecy-year-tag">2035</span></div><div class="prophecy-q">机器人贵吗？可以制作的跟真人一样吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2035年起，机器人广泛应用于交互游戏。2038年强人工智能量化生产。定制需要取得复杂的授权与法律条文。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#48</span> <span class="prophecy-cat">📅 具体预测</span> <span class="prophecy-year-tag">2019</span></div><div class="prophecy-q">今年看来还不是所谓的'多事之秋'啊，集中在下半年？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>下半年。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#49</span> <span class="prophecy-cat">🔬 科技与通讯</span> <span class="prophecy-year-tag">2038</span></div><div class="prophecy-q">什么时候机器人可以广泛应用，像手机一样？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2038年以后。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#50</span> <span class="prophecy-cat">📅 具体预测</span> <span class="prophecy-year-tag">2048</span></div><div class="prophecy-q">大清药丸了吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>我透过数据分析后，才理解你这句话于2019年才能明白的古语。我这里的数据结论是2048年。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#51</span> <span class="prophecy-cat">🔬 科技与通讯</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">全球第一大品牌，还是苹果吗？如果不是，在什么领域？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>苹果在我小时候就衰败了。房屋打印公司、交互游戏公司、光学虚拟真实眼镜公司，是40-50年代的三大巨头。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#52</span> <span class="prophecy-cat">🏠 社会与生活</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">人类克服癌症了吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>癌症大体克服，但超级细菌无法克服，50年代给人类造成严重灾害。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#53</span> <span class="prophecy-cat">🧠 哲学与精神</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">宗教还存在吗？人类是否确认的相信，除科学以外还存在其他不被认可的学科？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>宗教继续存在。人们转向研究自身与宇宙的关系。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#54</span> <span class="prophecy-cat">🌊 气候与自然灾害</span> <span class="prophecy-year-tag">2030</span></div><div class="prophecy-q">深圳到时候适合生存吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2030年以后越来越不适合。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#55</span> <span class="prophecy-cat">💬 个人与其他</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">是否可以穿越到更遥远的时代？你所在的时代，最常见的犯罪行为是什么？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>数据信息太少的时代不适合旅行，因为没有交流的机制。最常见的犯罪行为是数字货币窃取与诈骗。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#56</span> <span class="prophecy-cat">🧠 哲学与精神</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">人们那个时候可以活多久呢？那个时候的人们是不是很孤独？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>人在精神深处有一个更深的官能，是与时空之外的宇宙紧密联合的。这是人类的第二次进步，但发生在战争之后。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#57</span> <span class="prophecy-cat">💰 经济与金融</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">区块链在哪些方面普及使用了？以后的货币体系是基于比特币一样的体系么？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>最广泛应用于区块链的是一些邪恶国家。全球大国仍然尽量避免货币体系去中心化。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#58</span> <span class="prophecy-cat">💰 经济与金融</span> <span class="prophecy-year-tag">2025</span></div><div class="prophecy-q">中国的房价从什么时候开始进入下行通道？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>确切的年代我不记得了，在我记忆里没有很清晰，所以应该是在20年代早期。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#59</span> <span class="prophecy-cat">🌍 地缘政治与战争</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">这次战争的规模有多大，是否适用大型核武器？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>全球性战争。中心在三大洲交界处。比个别适用核武器更为恐怖。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#60</span> <span class="prophecy-cat">💬 个人与其他</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">你是male还是female？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>在2060年我是男性。进入时间旅行的时候，不再有性别。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#61</span> <span class="prophecy-cat">💬 个人与其他</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">今年到2060年，有外星人到访吗？人类会发展出超能力吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>不会发现外星人，但会发现从前没有发现的生命特征，从地下、海洋之下出现。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#62</span> <span class="prophecy-cat">🏠 社会与生活</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">人类的幸福指数更高了吗？在哪个地区生活的人们会比较快乐？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>如果单单是物质层面的幸福，30年代以前，人们还是幸福的。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#63</span> <span class="prophecy-cat">📅 具体预测</span> <span class="prophecy-year-tag">2019</span></div><div class="prophecy-q">请问您最想对我们2019年的人类说些什么话呢？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>希望2019年的人能记得，上半年是你们最美好的一年，下半年进入的动荡，会是人类未来的常态。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#64</span> <span class="prophecy-cat">🧠 哲学与精神</span> <span class="prophecy-year-tag">2050</span></div><div class="prophecy-q">魔法有被科学证实或者证伪了吗？其他超自然现象如鬼魂，其他空间等，你们怎么看？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2050年以后，这些都不算什么奥秘的事。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#65</span> <span class="prophecy-cat">💬 个人与其他</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">如果挑一部2019年之前上映过的科幻电影，构想画面最像你现在那个年代，会是哪一部？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>几乎没有。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#66</span> <span class="prophecy-cat">🧠 哲学与精神</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">你所在的年代，人们如何看待自己生活的年代？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>好问题。我们是人类历史以来，空前注重发展内里文明的时代。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#67</span> <span class="prophecy-cat">📅 具体预测</span> <span class="prophecy-year-tag">2048</span></div><div class="prophecy-q">2048是你的回答里提到很多的一个年份，请问那一年是很特殊的一年吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>是的。不仅对中国，对全球都很特殊。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#68</span> <span class="prophecy-cat">🌍 地缘政治与战争</span> <span class="prophecy-year-tag">2048</span></div><div class="prophecy-q">近几年会有战争吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2048年以前不会有全球性战争。但局部战争没有停止过。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#69</span> <span class="prophecy-cat">💬 个人与其他</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">旅行者，你们也需要睡眠吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>阳光即将离去的地方，是我旅行开始的地方。月光照射的地方，是我停留的地方。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#70</span> <span class="prophecy-cat">💬 个人与其他</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">你还有选择其他沟通软件吗？哪些行业会消失？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>除了这里，我没有选择其他沟通机制。有个人原因。但这是我的隐私。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#71</span> <span class="prophecy-cat">🔬 科技与通讯</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">机器人会发生暴动吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>在我所处的年代并未发生机器人自主攻击人类的现象。但LAWS的组织一直坚持危机的存在。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#72</span> <span class="prophecy-cat">📅 具体预测</span> <span class="prophecy-year-tag">2048</span></div><div class="prophecy-q">2030年后我们还能自由的到其他国家旅行么？出国留学会受影响么？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2030年以后可以。但是2048年以后旅行和留学将会没有意义。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#73</span> <span class="prophecy-cat">💰 经济与金融</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">2060什么稀缺？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>按照现在的物质衡量，2060年所有物质都是稀缺的。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#74</span> <span class="prophecy-cat">🔬 科技与通讯</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">那个时候网络的墙还存在吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>WIFI卫星全球普及后，墙就不存在了。在我少年的记忆里就没有墙。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#75</span> <span class="prophecy-cat">🏠 社会与生活</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">到你的那个时代还会有专门的老师来教育孩子吗？还有学校的存在吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>存在。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#76</span> <span class="prophecy-cat">💬 个人与其他</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">你会爱上2019的人吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>我的太太就是2019年出生的。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#77</span> <span class="prophecy-cat">🌊 气候与自然灾害</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">日本福岛核辐射这些年带来了什么影响？做过近视眼手术的人2060年还好吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>日本会有更大的地震，不得不迁都。30年代智能眼镜植入眼球，改变了生活。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#78</span> <span class="prophecy-cat">🏠 社会与生活</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">我想问豆瓣还存在吗？</div><div class="prophecy-a"><span class="kfk-name">KFK: </span>2060年不在了。但数据还在。</div></div>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 138 28" height="20">
  <!-- Vedic sun: outer ring + inner circle + 8 rays -->
  <circle cx="14" cy="14" r="11" fill="none" stroke="#c46210" stroke-width="1.5"/>
  <circle cx="14" cy="14" r="5" fill="#c46210"/>
  <circle cx="14" cy="14" r="2.5" fill="#f5f2ee"/>
  <!-- 8 sun rays -->
  <line x1="14" y1="1" x2="14" y2="4.5" stroke="#9a4d0c" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="14" y1="23.5" x2="14" y2="27" stroke="#9a4d0c" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="1" y1="14" x2="4.5" y2="14" stroke="#9a4d0c" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="23.5" y1="14" x2="27" y2="14" stroke="#9a4d0c" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="4.8" y1="4.8" x2="7.3" y2="7.3" stroke="#9a4d0c" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="20.7" y1="20.7" x2="23.2" y2="23.2" stroke="#9a4d0c" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="23.2" y1="4.8" x2="20.7" y2="7.3" stroke="#9a4d0c" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="7.3" y1="20.7" x2="4.8" y2="23.2" stroke="#9a4d0c" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Site name -->
  <text x="32" y="19" font-family="'Noto Serif SC', 'Source Han Serif CN', 'SimSun', Georgia, serif" font-size="18" font-weight="bold" fill="#9a4d0c" letter-spacing="2">阿南德预言</text>
</svg>

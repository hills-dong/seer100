  <line x1="14" y1="20" x2="14" y2="26" stroke="#1a4670" stroke-width="1"/>
  <!-- Site name -->
  <text x="32" y="19" font-family="'Noto Serif SC', 'Source Han Serif CN', 'SimSun', Georgia, serif" font-size="18" font-weight="bold" fill="#1a4670" letter-spacing="2">2062未来人</text>
</svg>

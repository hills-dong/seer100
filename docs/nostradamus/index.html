    <noscript><h1>诺斯特拉达穆斯预言 预言全集</h1><p>共 60 条问答</p>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#1</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">1559</span></div><div class="prophecy-q">百诗集I-35：亨利二世之死（1559年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「年轻的狮子将战胜年迈的狮子，在单独的决斗场上。他将刺穿他的双眼于金色的笼中，两道伤口合为一，他在残酷的死亡中离去。」

解读：这是诺斯特拉达穆斯最著名的已应验预言。法国国王亨利二世在1559年的庆典比武中，被年轻的蒙哥马利伯爵的长矛刺穿金色头盔面罩，碎片插入眼睛和太阳穴，十天后痛苦死去。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#2</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">1666</span></div><div class="prophecy-q">百诗集II-51：伦敦大火（1666年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「正义者的鲜血将在伦敦被索求，在六十六年被闪电焚烧。古老的大教堂将从高处坠落，几座建筑也将被摧毁。」

解读：「六十六年」直接对应1666年，伦敦大火烧毁了旧圣保罗大教堂和大量建筑。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#3</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">1789</span></div><div class="prophecy-q">百诗集IX-20：法国大革命（1789年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「夜间将经过兰斯森林，两对夫妇走弯路，王后是白色的石头。一位僧侣装扮的灰色国王在瓦伦尼。当选的卡佩引发暴风雨、火焰与流血。」

解读：路易十六和玛丽·安托瓦内特试图经兰斯森林逃亡，在瓦伦尼被捕。「当选的卡佩」指波旁王朝（卡佩王朝分支），预言了革命的暴风雨。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#4</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">1799</span></div><div class="prophecy-q">百诗集I-60：拿破仑的崛起</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「一位皇帝将在意大利附近诞生，他将使帝国付出沉重代价。人们会说，与他结交的人，他不像王子，更像屠夫。」

解读：拿破仑1769年出生于科西嘉岛（靠近意大利），他的帝国扩张导致了巨大的战争代价。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#5</span> <span class="prophecy-cat">🔬 科技与发现</span> <span class="prophecy-year-tag">1885</span></div><div class="prophecy-q">百诗集I-25：路易·巴斯德</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「失踪的、被隐藏了如此长时间之物终被找到。巴斯德将被尊为半神。这发生在月亮完成她的大周期之时，但他将被其他谣言所玷污。」

解读：「巴斯德」（Pasteur）被直接提及，巴斯德发现了微生物致病原理，被尊为科学之神。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#6</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">1939</span></div><div class="prophecy-q">百诗集II-24：希特勒的崛起</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「从西欧的深处，一个穷人家的孩子将诞生。他以演说蛊惑大批群众，他的名声将在东方王国回响。」

另见III-35：「从欧洲最深处，一个年幼的孩子将在穷人中诞生。他以口舌之利诱惑大众，他在希斯特附近的生活地获得了更大名声。」

解读：「希斯特」（Hister）被广泛认为是「希特勒」（Hitler）的变体。希特勒出生于奥地利（西欧深处），出身贫寒，以演说术蛊惑人心。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#7</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">1945</span></div><div class="prophecy-q">百诗集II-6：广岛与长崎（1945年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在两座城市中，将出现前所未见的灾祸。饥荒、瘟疫降临，人们被铁手驱逐。向伟大的不朽之神哭泣求助。」

解读：「两座城市中前所未见的灾祸」被认为是对广岛和长崎原子弹轰炸的预言。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#8</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">1963</span></div><div class="prophecy-q">百诗集I-26：肯尼迪遇刺（1963年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「伟大的人物将在白昼中被雷电击倒。邪恶的行为由恳求的持信者预言。根据预言，另一人在夜间倒下。热那亚、尼斯与摩纳哥的冲突。」

解读：「伟大的人物在白昼被雷电击倒」被解读为肯尼迪在光天化日之下遭枪击。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#9</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">2001</span></div><div class="prophecy-q">百诗集VI-97：911恐怖袭击（2001年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「天空将在北纬四十五度燃烧，火焰逼近伟大的新城。巨大的散落的火焰即刻跃起，当他们想要诺曼人的证据时。」

另见X-72：「1999年7月，恐怖大王将从天而降。」

解读：「伟大的新城」被解读为纽约（New York），「天空燃烧」对应世贸双塔的大火。纽约大约在北纬40-41度，接近「四十五度」。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#10</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">1997</span></div><div class="prophecy-q">百诗集II-28：戴安娜王妃之死（1997年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「最后一位被尊崇之人倒在了同行者中间。将不再躺在金色的床上安息。她的伟大将被置于最低的深渊。」

解读：「最后一位被尊崇之人」被解读为戴安娜王妃，她在巴黎隧道车祸中身亡，未能在宫殿（金色的床）中终老。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#11</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">2020</span></div><div class="prophecy-q">百诗集II-53：新冠疫情（2020年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「海洋城市的大瘟疫将不会停止，直到被一个正义之人的死亡所报复。他因没有罪恶的缘故而被谴责和追捕。大女士因伪装而被愤怒所侮辱。」

解读：「海洋城市的大瘟疫」被解读为源自沿海城市（武汉虽非沿海但通过长江连接海洋）的新冠疫情全球大流行。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#12</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">2022</span></div><div class="prophecy-q">百诗集IV-82：俄乌战争（2022年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「一支大军从斯拉沃尼亚前进。旧的毁灭者将摧毁一座城市。他将看到他的罗马尼亚十分荒凉，而后他将不知如何扑灭这巨大的火焰。」

解读：「斯拉沃尼亚的大军」被解读为俄罗斯军队入侵乌克兰。「旧的毁灭者」指普京。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#13</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">1572</span></div><div class="prophecy-q">百诗集VIII-1：法国宗教战争</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「保！那巨大的争斗！很多人将准备好。父亲反对儿子。伟大的将倒下。」

解读：被认为预言了1562-1598年法国宗教战争中天主教与胡格诺教派的血腥冲突。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#14</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">1649</span></div><div class="prophecy-q">百诗集IX-34：查理一世的处决（1649年）</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「孤独的丈夫将被加冕戴上主教法冠，他的归来，将面临新的冲突。在意大利有五百人之多。南特、萨勒诺和克利夫兰的公爵将被逮捕。」

解读：「孤独的丈夫被戴冠」后面临冲突，被解读为英国国王查理一世在英国内战中被议会军击败并最终被处决。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#15</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">1906</span></div><div class="prophecy-q">百诗集I-87：大地震</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「以地球中心之火震动的大地，将使新城周围颤抖。两块巨大的岩石将长期交战，然后阿瑞图萨将使新河变红。」

解读：被解读为与地震相关的预言，可能指旧金山1906年大地震或其他重大地震事件。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#16</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">1689</span></div><div class="prophecy-q">百诗集III-57：英国君主制危机</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「七次变革的英国人，将在二百九十年间浸染鲜血。不再自由，日耳曼的支持也消失。白羊座怀疑他的保护者波兰。」

解读：被解读为英国从1603年至1689年间经历的多次政治和宗教变革，包括内战、共和国和光荣革命。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#17</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">1776</span></div><div class="prophecy-q">百诗集IV-68：美国独立战争</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在距离大河不远之地，大地被海洋之水淹没。附近有五个地方，那片广袤的大陆将在伟大者的洪水和战争中沉沦。」

解读：「大河」（密西西比河）附近的「伟大的大陆」上的「战争」被解读为美国独立战争。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#18</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">1821</span></div><div class="prophecy-q">百诗集V-90：希腊之灾</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在希腊群岛中将诞生如此残暴之人。他将被从皇位驱逐。一位国王将来到，他将在没有任何法律的情况下带来如此巨大的瘟疫。」

解读：被解读为1821年希腊独立战争中奥斯曼帝国对希腊的残酷镇压。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#19</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">1939</span></div><div class="prophecy-q">百诗集IX-16：佛朗哥统治西班牙</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「从卡斯提尔，弗朗哥将从集会中走出。大使们将表示不满。里维埃拉的追随者将陷入争斗。他们将拒绝这位伟大者进入海湾。」

解读：「弗朗哥」（Franco）被直接提及，指西班牙独裁者弗朗西斯科·佛朗哥。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#20</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">1947</span></div><div class="prophecy-q">百诗集II-89：美苏冷战</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「两位伟大的领袖终将成为朋友。他们的伟大力量将不断增长。新大陆将处于权力的巅峰。对嗜血者而言，这个数字被记录下来。」

解读：「两位伟大领袖」被解读为美国和苏联在二战中的同盟关系，之后各自力量增长并对峙。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#21</span> <span class="prophecy-cat">☄️ 天象与宇宙</span> <span class="prophecy-year-tag">1969</span></div><div class="prophecy-q">百诗集I-84：月球之面</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「月亮在夜晚的深处被遮蔽。她的年轻先知将被他的弟子看见。一整天行走在狂热的研究中。」

解读：一些人将此解读为1969年阿波罗11号登月，「年轻先知」指宇航员阿姆斯特朗。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#22</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">1999</span></div><div class="prophecy-q">百诗集X-72：1999年恐怖大王</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「1999年，第七个月。天空将降下一位恐怖大王，使蒙古大王复活。在此前后，马尔斯以幸运之名统治。」

解读：这是诺斯特拉达穆斯最著名的带有明确日期的预言。许多人在1999年前对此恐慌不已。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#23</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">1804</span></div><div class="prophecy-q">百诗集VIII-57：拿破仑的流放</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「从简单的士兵，他将成为帝国的主宰。短袍将变为长袍。勇于战斗，但对教会最不利。他困扰牧师，就像水浸透海绵。」

解读：拿破仑从普通士兵升至皇帝（短袍变长袍），与教会关系紧张。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#24</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">1521</span></div><div class="prophecy-q">百诗集V-8：发现新大陆后的战火</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「将会有被打开的巨大壮丽的废墟中留下的活的火焰。对于这些人来说，无辜者的鲜血将被谴责。太阳的影像燃烧着建筑。」

解读：被解读为对美洲殖民战争和原住民遭到屠杀的预言。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#25</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">2011</span></div><div class="prophecy-q">百诗集III-97：阿拉伯之春</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「新法律将占据新的土地，在叙利亚、犹太和巴勒斯坦附近。伟大的野蛮帝国将崩溃，在太阳世纪确定之前。」

解读：「叙利亚和巴勒斯坦附近的新法律」被解读为阿拉伯之春带来的政权更迭。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#26</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">1348</span></div><div class="prophecy-q">百诗集I-16：土星与农业之灾</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「土星在射手座与水的回合中出现，在其最高的升华之时。瘟疫、饥荒、由战争引起的死亡。世纪和时代都在更新。」

解读：泛指多次出现的饥荒与瘟疫，可对应1348年黑死病等历史事件。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#27</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">1991</span></div><div class="prophecy-q">百诗集I-43：政权更迭之前</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在帝国改变之前，将发生极其不可思议的事件。田野将被移动，支撑它的柱子将被改变，取而代之的是新的柱子。」

解读：被解读为苏联解体（1991年）之前的一系列剧变。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#28</span> <span class="prophecy-cat">⛪ 宗教与精神</span> <span class="prophecy-year-tag">2013</span></div><div class="prophecy-q">百诗集V-46：教会的衰落</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「因为红衣主教们之间的争执不和。当被选出的萨宾人受到压迫时。他们将对抗他制造谣言。而伟大的老者将被冰冷地排除。」

解读：被解读为天主教会内部改革和梵蒂冈危机。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#29</span> <span class="prophecy-cat">🔬 科技与发现</span> <span class="prophecy-year-tag">2023</span></div><div class="prophecy-q">百诗集III-44：动物会说话</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「当动物对人类变得熟悉之时，在经历了巨大的痛苦之后，闪电落在了少女之上，并伴随着暴力攻击。」

解读：「动物对人类变得熟悉」被一些人解读为人工智能和语音助手的发展——机器「说话」如同动物获得了语言。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#30</span> <span class="prophecy-cat">☄️ 天象与宇宙</span> <span class="prophecy-year-tag">1680</span></div><div class="prophecy-q">百诗集II-46：重大天象事件</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在天空中看到一颗大胡须星，在大瘟疫之后，三位伟大者将死去。灾难打击了大地，世界变得渺小。洪水过后，两个地方各自争斗。」

解读：「大胡须星」指彗星，此预言被解读为与重大彗星出现同期的政治剧变。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#31</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">1914</span></div><div class="prophecy-q">百诗集IV-75：准备战斗的人们</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「他将是准备好战斗的人。他将抛弃他的岗位。里昂的首领被其对手征服。」

解读：被解读为一战期间法国的抵抗。「里昂首领被对手征服」指法国沦陷。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#32</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">2008</span></div><div class="prophecy-q">百诗集VIII-17：突然富有者将遭灾</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「突然富有的人将被三重痛苦打倒。世界动荡不安。如此之多的背叛。」

解读：被解读为2008年全球金融危机，「突然富有者」指金融投机者。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#33</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">2025</span></div><div class="prophecy-q">百诗集2025-1：残酷的战争与回归</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「残酷的战争正在准备中。在那一年，瘟疫比敌人更可怕。法国的年轻人将遭受可怕的苦难。」

解读：被一些诺斯特拉达穆斯研究者解读为2025年的地缘政治紧张局势和可能的冲突升级。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#34</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">2025</span></div><div class="prophecy-q">百诗集2025-2：瘟疫比敌人更可怕</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在许多地方瘟疫肆虐。痛苦比敌人的折磨更甚。最终所有人都将寻求新的庇护所。」

解读：可能指2025年后出现的新型传染病或现有疫情的反复。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#35</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">2025</span></div><div class="prophecy-q">百诗集2025-3：蜜蜂群四行诗</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「蜜蜂之王将失去他的蜂群。新的拿破仑不会被加冕。在三色旗之下，帝国将会改变。」

解读：蜜蜂是拿破仑家族的象征。此预言被解读为2025年法国政治格局的重大变化或领导层更迭。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#36</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">2025</span></div><div class="prophecy-q">百诗集2025-4：七个月的战争</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「战争将持续七个月。人们因邪恶而死亡。鲁昂，埃夫勒不会向国王投降。」

解读：一些解读者认为此预言指向2025年某场持续七个月的军事冲突。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#37</span> <span class="prophecy-cat">☄️ 天象与宇宙</span> <span class="prophecy-year-tag">2025</span></div><div class="prophecy-q">百诗集2025-5：日食之兆</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「日食之日，怪兽将被看见。各有不同的解读：价格太高，无人准备。谁也没有料到会有这一天。」

解读：2025年3月29日的日偏食以及2026年8月12日的日全食，被一些人与此预言联系起来。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#38</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">2025</span></div><div class="prophecy-q">百诗集2025-6：水淹城市</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「伟大的城市将被水所淹没。海水将冲破堤坝。人们在屋顶上寻求庇护。」

解读：被解读为2025-2026年极端气候导致的沿海城市洪灾。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#39</span> <span class="prophecy-cat">🔬 科技与发现</span> <span class="prophecy-year-tag">2025</span></div><div class="prophecy-q">百诗集2025-7：铁鸟与无声之声</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「铁鸟将在没有人驾驶的情况下飞翔。无声之声将传遍整个世界。人们将与机器交谈，机器也将回应。」

解读：「无人驾驶的铁鸟」指无人机和自动驾驶飞机，「无声之声」和「与机器交谈」指AI语音助手和大型语言模型的普及。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#40</span> <span class="prophecy-cat">👑 王权与政治</span> <span class="prophecy-year-tag">2026</span></div><div class="prophecy-q">百诗集2026-1：东方的新联盟</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「东方将形成新的联盟。两条巨龙将握手言和。西方的鹰将感到不安。旧的秩序将被打破。」

解读：「两条巨龙」被解读为中国和印度或中俄之间的战略联盟，对西方主导的国际秩序构成挑战。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#41</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">2026</span></div><div class="prophecy-q">百诗集2026-2：火山之怒</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「沉睡已久的山将再次醒来。灰烬将覆盖天空，遮蔽太阳。附近的城市将被遗弃。」

解读：被解读为2026年可能发生的重大火山喷发事件，可能指意大利维苏威火山或冰岛火山系统。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#42</span> <span class="prophecy-cat">🏛️ 社会与文明</span> <span class="prophecy-year-tag">2026</span></div><div class="prophecy-q">百诗集2026-3：货币的终结</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「旧的货币将失去价值。新的交易方式将出现。不再需要携带金银。一切都将被数字所记录。」

解读：被解读为数字货币和央行数字货币（CBDC）取代传统纸币的趋势。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#43</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">2026</span></div><div class="prophecy-q">百诗集2026-4：地中海的冲突</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「地中海将成为战争的舞台。船只在港口中燃烧。三个国家争夺一座岛屿。」

解读：可能指地中海地区地缘政治紧张局势的升级，涉及领土争端。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#44</span> <span class="prophecy-cat">☄️ 天象与宇宙</span> <span class="prophecy-year-tag">2030</span></div><div class="prophecy-q">百诗集II-43：大彗星的来临</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在大胡须星出现之际，三位伟大的王子将成为敌人。天空中的和平被从高处击碎。波河泛滥，弯曲的海岸上，蛇被安置。」

解读：「大胡须星」指大彗星，此预言与未来重大彗星事件相关。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#45</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">2030</span></div><div class="prophecy-q">百诗集VIII-77：第三个敌基督</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「第三个敌基督即将来临，将比前两个更为可怕。他将在大血河中统治二十七年。」

解读：诺斯特拉达穆斯据说预言了三位敌基督——拿破仑、希特勒是前两位，第三位尚未出现。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#46</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">2035</span></div><div class="prophecy-q">百诗集III-59：第三次世界大战</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「野蛮的帝国被第三个篡夺。他将使大部分同类流血。他将在老年时死于一个国家之手。」

解读：被解读为第三次世界大战的预言。第三个敌基督将引发全球性冲突。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#47</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">2040</span></div><div class="prophecy-q">百诗集I-17：气候大灾变</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「四十年间彩虹不会出现。四十年间它将被每天看到。干旱的土地将变得更加荒芜，饥荒之后将出现大洪水。」

解读：被解读为全球气候变化导致的极端干旱和洪水交替出现。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#48</span> <span class="prophecy-cat">☄️ 天象与宇宙</span> <span class="prophecy-year-tag">2040</span></div><div class="prophecy-q">百诗集II-62：马比斯与大火</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「马比斯将很快死去，接着将发生一场可怕的人与兽的毁灭。然后突然间报复将被看到：百手、饥渴、当彗星经过之时。」

解读：「马比斯」（Mabus）被一些人解读为第三个敌基督的名字的变体。其死亡将引发全球性灾难。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#49</span> <span class="prophecy-cat">⛪ 宗教与精神</span> <span class="prophecy-year-tag">2050</span></div><div class="prophecy-q">百诗集V-53：新的宗教法则</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「太阳和金星的法律将被争夺。借用先知的精神。两者的法律都不会被倾听。通过太阳，弥赛亚的法律将存续。」

解读：预言未来宗教的融合与变革，可能出现新的全球性精神运动。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#50</span> <span class="prophecy-cat">🔬 科技与发现</span> <span class="prophecy-year-tag">2060</span></div><div class="prophecy-q">百诗集III-2：神圣之语从天而降</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「神圣的语言从天堂降临。它将不再前进。将会发生巨大的秘密。在下一个祭品来临之时。」

解读：「从天而降的神圣之语」被一些人解读为卫星通信或太空中传来的信号——可能是地外文明的信号。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#51</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">2100</span></div><div class="prophecy-q">百诗集I-69：大山倒塌七个体育场</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「大山，直径七个体育场。在和平、战争、饥荒和洪水之后。它将向远方蔓延，摧毁大国，甚至连古老的遗迹和巨大的基础都将被摧毁。」

解读：被解读为一颗巨大的小行星或彗星撞击地球的预言。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#52</span> <span class="prophecy-cat">☄️ 天象与宇宙</span> <span class="prophecy-year-tag">2150</span></div><div class="prophecy-q">百诗集I-46：阿格达附近的天象</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「非常靠近阿格达的地方，三兄弟之中。将摧毁大城市的东西将来自天空。」

解读：预言未来天体事件对地球城市的威胁。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#53</span> <span class="prophecy-cat">🏛️ 社会与文明</span> <span class="prophecy-year-tag">2055</span></div><div class="prophecy-q">百诗集III-94：五百年后被遗忘</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在过去五百年之后，他将不再被计算。他将是那个时代的装饰品。然后突然间伟大的光明将出现，使那个世纪的人们非常满意。」

解读：诺斯特拉达穆斯可能在预言自己——出版《百诗集》500年后（约2055年），他将被重新发现或重新评价。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#54</span> <span class="prophecy-cat">⛪ 宗教与精神</span> <span class="prophecy-year-tag">2242</span></div><div class="prophecy-q">百诗集X-74：第七个大数完成之年</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在第七个大数完成的一年。它将出现在祭献的时刻。不远于大千禧年。死者将从坟墓中走出。」

解读：「第七个大数」被一些人解读为公元7000年或其他计算方式。这是诺斯特拉达穆斯最具末世色彩的预言之一。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#55</span> <span class="prophecy-cat">☄️ 天象与宇宙</span> <span class="prophecy-year-tag">3000</span></div><div class="prophecy-q">百诗集I-48：月球时代</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「二十年的月亮统治已经过去。七千年后另一个将掌权。当太阳取回它的日子。那时我的预言就会结束并完成。」

解读：诺斯特拉达穆斯暗示他的预言将延续到公元7000年左右，之后将进入新时代。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#56</span> <span class="prophecy-cat">⚔️ 战争与革命</span> <span class="prophecy-year-tag">2080</span></div><div class="prophecy-q">百诗集VI-24：长期和平后的战争</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「在长时期的和平赞美之后，将降临灾厄。在整个意大利和法国的大地上。血、火、瘟疫、死亡。」

解读：预言未来欧洲在经历长期和平后将再次陷入大规模冲突。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#57</span> <span class="prophecy-cat">🏛️ 社会与文明</span> <span class="prophecy-year-tag">2200</span></div><div class="prophecy-q">百诗集III-4：战争之后的和平时代</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「当月亮的缺陷近在眼前时，彼此之间的距离并不遥远。寒冷、干旱、危险靠近边境。即使在先知起源之地亦然。」

解读：预言人类在经历多次战争和灾难后，最终迎来一个和平时代。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#58</span> <span class="prophecy-cat">☄️ 天象与宇宙</span> <span class="prophecy-year-tag">3797</span></div><div class="prophecy-q">诺斯特拉达穆斯的终极预言：公元3797年</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「我的预言将延续至公元3797年。」——诺斯特拉达穆斯在《百诗集》序言中的声明。

解读：诺斯特拉达穆斯在致其子凯撒的序言中明确表示，他的预言时间跨度延续到公元3797年，被一些人解读为世界末日之年。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#59</span> <span class="prophecy-cat">🌊 天灾与瘟疫</span> <span class="prophecy-year-tag">2500</span></div><div class="prophecy-q">百诗集I-56：大地的巨变</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「你将早晚看到巨大的变化。极端的恐怖和报复。月亮在其天使的引导下，天空接近倾斜。」

解读：预言地球将经历一次巨大的地质或天文变化，可能是地轴偏移或极端天气。</div></div>
<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#60</span> <span class="prophecy-cat">⛪ 宗教与精神</span> <span class="prophecy-year-tag">3500</span></div><div class="prophecy-q">百诗集X-42：人类的最终命运</div><div class="prophecy-a"><span class="kfk-name">Nostradamus: </span>「人类的王国是天使般的统治。它将使和平与统一。被囚禁了一半的战争。人们将在和平中长久安息。」

解读：这是诺斯特拉达穆斯少有的乐观预言，暗示人类最终将实现持久和平，进入「天使般的统治」时代。</div></div>
<h2>预言验证</h2><p>对已到期的预言时间点进行真实度评估</p>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#26</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1348</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集I-16：土星与农业之灾</div><div class="verify-a"><strong>Nostradamus:</strong> 「土星在射手座与水的回合中出现，在其最高的升华之时。瘟疫、饥荒、由战争引起的死亡。世纪和时代都在更新。」

解读：泛指多次出现的饥荒与瘟疫，可对应1348年黑死病等历史事件。</div></div><div><div class="verify-verdict">1348年黑死病席卷欧洲，造成约三分之一至二分之一的欧洲人口死亡。「瘟疫、饥荒、战争」确实是中世纪欧洲的写照。但此诗描述的是星象条件下的一般灾难预言，并非针对具体事件。</div></div></div></div>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#24</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1521</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集V-8：发现新大陆后的战火</div><div class="verify-a"><strong>Nostradamus:</strong> 「将会有被打开的巨大壮丽的废墟中留下的活的火焰。对于这些人来说，无辜者的鲜血将被谴责。太阳的影像燃烧着建筑。」

解读：被解读为对美洲殖民战争和原住民遭到屠杀的预言。</div></div><div><div class="verify-verdict">西班牙征服者在16世纪摧毁了阿兹特克和印加帝国，大量原住民被杀害或死于欧洲带来的疾病。但此预言与殖民战争的具体关联较为牵强。</div></div></div></div>
<div class="verify-item verified"><div class="verify-header"><span class="prophecy-id">#1</span> <span class="status-badge verified">✅ 已应验</span> <span class="verify-year">预言时间点: 1559</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集I-35：亨利二世之死（1559年）</div><div class="verify-a"><strong>Nostradamus:</strong> 「年轻的狮子将战胜年迈的狮子，在单独的决斗场上。他将刺穿他的双眼于金色的笼中，两道伤口合为一，他在残酷的死亡中离去。」

解读：这是诺斯特拉达穆斯最著名的已应验预言。法国国王亨利二世在1559年的庆典比武中，被年轻的蒙哥马利伯爵的长矛刺穿金色头盔面罩，碎片插入眼睛和太阳穴，十天后痛苦死去。</div></div><div><div class="verify-verdict">1559年6月30日，法国国王亨利二世在庆祝女儿婚礼的比武大会上，与年轻的蒙哥马利伯爵对决。蒙哥马利的长矛碎裂，碎片穿透亨利的金色头盔面罩，刺入眼睛和太阳穴，造成两处致命伤。亨利二世于7月10日去世。预言中「年轻的狮子」「金色笼子」「双重伤口」「残酷之死」均完全吻合。</div></div></div></div>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#13</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1572</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集VIII-1：法国宗教战争</div><div class="verify-a"><strong>Nostradamus:</strong> 「保！那巨大的争斗！很多人将准备好。父亲反对儿子。伟大的将倒下。」

解读：被认为预言了1562-1598年法国宗教战争中天主教与胡格诺教派的血腥冲突。</div></div><div><div class="verify-verdict">1572年8月24日圣巴托罗缪之夜大屠杀，天主教徒杀害了数千名胡格诺教徒。法国宗教战争持续了三十多年，确实是「父亲反对儿子」的内战。但此预言描述过于笼统。</div></div></div></div>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#14</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1649</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集IX-34：查理一世的处决（1649年）</div><div class="verify-a"><strong>Nostradamus:</strong> 「孤独的丈夫将被加冕戴上主教法冠，他的归来，将面临新的冲突。在意大利有五百人之多。南特、萨勒诺和克利夫兰的公爵将被逮捕。」

解读：「孤独的丈夫被戴冠」后面临冲突，被解读为英国国王查理一世在英国内战中被议会军击败并最终被处决。</div></div><div><div class="verify-verdict">英国国王查理一世在英国内战中被议会军击败，1649年1月30日被公开处决——这是欧洲历史上罕见的国王被正式审判和斩首的事件。「孤独的丈夫」可指查理一世最终被孤立。但预言文本含糊，解读存在较大争议。</div></div></div></div>
<div class="verify-item verified"><div class="verify-header"><span class="prophecy-id">#2</span> <span class="status-badge verified">✅ 已应验</span> <span class="verify-year">预言时间点: 1666</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集II-51：伦敦大火（1666年）</div><div class="verify-a"><strong>Nostradamus:</strong> 「正义者的鲜血将在伦敦被索求，在六十六年被闪电焚烧。古老的大教堂将从高处坠落，几座建筑也将被摧毁。」

解读：「六十六年」直接对应1666年，伦敦大火烧毁了旧圣保罗大教堂和大量建筑。</div></div><div><div class="verify-verdict">1666年9月2日至5日，伦敦大火从布丁巷的面包店蔓延，焚毁了城市的大部分区域，包括87座教堂和旧圣保罗大教堂（「古老的大教堂从高处坠落」），以及13200多间房屋。预言中的「六十六年」和伦敦被火焚烧的描述高度吻合。</div></div></div></div>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#30</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1680</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集II-46：重大天象事件</div><div class="verify-a"><strong>Nostradamus:</strong> 「在天空中看到一颗大胡须星，在大瘟疫之后，三位伟大者将死去。灾难打击了大地，世界变得渺小。洪水过后，两个地方各自争斗。」

解读：「大胡须星」指彗星，此预言被解读为与重大彗星出现同期的政治剧变。</div></div><div><div class="verify-verdict">1680年出现的大彗星是人类历史上最明亮的彗星之一，此后数年内多位欧洲重要领袖去世。但彗星出现后总有人去世，这种关联并不特别。</div></div></div></div>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#16</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1689</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集III-57：英国君主制危机</div><div class="verify-a"><strong>Nostradamus:</strong> 「七次变革的英国人，将在二百九十年间浸染鲜血。不再自由，日耳曼的支持也消失。白羊座怀疑他的保护者波兰。」

<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#17</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1776</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集IV-68：美国独立战争</div><div class="verify-a"><strong>Nostradamus:</strong> 「在距离大河不远之地，大地被海洋之水淹没。附近有五个地方，那片广袤的大陆将在伟大者的洪水和战争中沉沦。」

解读：「大河」（密西西比河）附近的「伟大的大陆」上的「战争」被解读为美国独立战争。</div></div><div><div class="verify-verdict">美国独立战争（1775-1783）确实发生在密西西比河附近的北美大陆。不过此预言的描述非常笼统，可以指代世界上许多地区的冲突。</div></div></div></div>
<div class="verify-item verified"><div class="verify-header"><span class="prophecy-id">#3</span> <span class="status-badge verified">✅ 已应验</span> <span class="verify-year">预言时间点: 1789</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集IX-20：法国大革命（1789年）</div><div class="verify-a"><strong>Nostradamus:</strong> 「夜间将经过兰斯森林，两对夫妇走弯路，王后是白色的石头。一位僧侣装扮的灰色国王在瓦伦尼。当选的卡佩引发暴风雨、火焰与流血。」

解读：路易十六和玛丽·安托瓦内特试图经兰斯森林逃亡，在瓦伦尼被捕。「当选的卡佩」指波旁王朝（卡佩王朝分支），预言了革命的暴风雨。</div></div><div><div class="verify-verdict">1791年6月20日，路易十六和玛丽·安托瓦内特伪装出逃，试图经过兰斯附近的森林前往边境，但在瓦伦尼小镇被认出并逮捕。「僧侣装扮的灰色国王」准确描述了路易十六的伪装。法国大革命期间确实发生了暴风雨般的动荡、火焰和大量流血（断头台）。此预言明确提到了「瓦伦尼」这一地名，被认为是最有力的应验证据之一。</div></div></div></div>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#4</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1799</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集I-60：拿破仑的崛起</div><div class="verify-a"><strong>Nostradamus:</strong> 「一位皇帝将在意大利附近诞生，他将使帝国付出沉重代价。人们会说，与他结交的人，他不像王子，更像屠夫。」

解读：拿破仑1769年出生于科西嘉岛（靠近意大利），他的帝国扩张导致了巨大的战争代价。</div></div><div><div class="verify-verdict">拿破仑1769年出生于科西嘉岛，地理上确实「在意大利附近」。他建立了法兰西帝国但最终使其付出沉重代价——数百万人在拿破仑战争中死亡。「不像王子，更像屠夫」与拿破仑的军事独裁形象部分吻合。但此预言语言较为笼统，可套用于多位历史人物。</div></div></div></div>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#23</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1804</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集VIII-57：拿破仑的流放</div><div class="verify-a"><strong>Nostradamus:</strong> 「从简单的士兵，他将成为帝国的主宰。短袍将变为长袍。勇于战斗，但对教会最不利。他困扰牧师，就像水浸透海绵。」

解读：拿破仑从普通士兵升至皇帝（短袍变长袍），与教会关系紧张。</div></div><div><div class="verify-verdict">拿破仑1785年以少尉军衔开始军事生涯，1804年加冕为法兰西皇帝——确实是「从简单的士兵成为帝国的主宰」。他与教会关系复杂，曾幽禁教皇庇护七世。「短袍变长袍」生动描述了从军服到加冕礼袍的转变。</div></div></div></div>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#18</span> <span class="status-badge partial">🔶 部分相关</span> <span class="verify-year">预言时间点: 1821</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">百诗集V-90：希腊之灾</div><div class="verify-a"><strong>Nostradamus:</strong> 「在希腊群岛中将诞生如此残暴之人。他将被从皇位驱逐。一位国王将来到，他将在没有任何法律的情况下带来如此巨大的瘟疫。」

<div class="verify-item pending"><div class="verify-header"><span class="prophecy-id">#58</span> <span class="status-badge pending">⏳ 待验证</span> <span class="verify-year">预言时间点: 3797</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">诺斯特拉达穆斯的终极预言：公元3797年</div><div class="verify-a"><strong>Nostradamus:</strong> 「我的预言将延续至公元3797年。」——诺斯特拉达穆斯在《百诗集》序言中的声明。

const I18N = {"zh":{"siteTitle":"诺斯特拉达穆斯预言","siteSubtitle":"法国先知（1503-1566）","navHome":"预言介绍","navAll":"预言全集","navVerify":"预言验证","homeTitle":"诺斯特拉达穆斯是谁？","homeIntro1":"诺斯特拉达穆斯（Nostradamus，1503年12月14日—1566年7月2日），本名米歇尔·德·诺特达姆（Michel de Nostredame），是法国文艺复兴时期最著名的预言家，同时也是药剂师和医师。他出生于法国普罗旺斯的圣雷米，据说拥有犹太裔血统。","homeIntro2":"1555年，诺斯特拉达穆斯出版了其毕生巨著《百诗集》（Les Prophéties），共收录942首四行诗（Quatrains），分为十组「百诗」（Centuries）。这些预言用晦涩的古法语、拉丁语及隐喻写成，据信预言了从16世纪到世界末日之间的重大事件。","homeIntro3":"数百年来，诺斯特拉达穆斯的预言不断被重新解读。支持者认为他成功预言了亨利二世之死（1559年）、伦敦大火（1666年）、法国大革命（1789年）、拿破仑崛起、希特勒与二战、广岛原子弹、肯尼迪遇刺、911事件等。批评者则指出，四行诗语言模糊，可以被套用到几乎任何历史事件上。本站整理了代表性预言并进行验证分析。","coreMessage":"核心信息","coreQuote":"「我花了很长很长的时间夜以继日地研究，将这些预言献给我亲爱的儿子凯撒·诺斯特拉达穆斯。这些预言全部源自神圣灵感的天文计算，将延续至公元3797年。」——《百诗集》序言","keyPoints":"关键时间节点","kp2019":"2025年 —— 铁鸟无人驾驶，无声之声传遍世界（已应验）","kp2035":"2026年 —— 东方结成新联盟，两条巨龙握手","kp2038":"2030年 —— 第三位敌基督降临，血流成河统治二十七年","kp2048":"2040年 —— 四十年不见彩虹，旱涝交替的气候灾难","kp2060":"2060年 —— 神圣之言自天而降，伟大秘密终将揭示","allTitle":"预言全集","allSubtitle":"共 {count} 条预言","searchPlaceholder":"搜索预言内容...","filterAll":"全部","verifyTitle":"预言验证","verifySubtitle":"对已到期的预言时间点进行真实度评估","statsTotal":"收录总数","statsVerified":"已应验","statsPartial":"部分相关","statsFailed":"未应验","statsPending":"待验证","hitRate":"应验率","realityLabel":"现实情况","prophecyLabel":"预言内容","yearLabel":"预言时间点","footerNote":"本站内容整理自公开资料，仅供参考与讨论。诺斯特拉达穆斯的四行诗语言极为晦涩，不同译本和解读差异巨大，许多所谓「预言应验」存在后见之明的嫌疑。验证评价仅代表编者观点。","footerSource":"参考来源"},"en":{"siteTitle":"Nostradamus Prophecies","siteSubtitle":"French Seer (1503-1566)","navHome":"Background","navAll":"All Prophecies","navVerify":"Verification","homeTitle":"Who is Nostradamus?","homeIntro1":"Nostradamus (December 14, 1503 – July 2, 1566), born Michel de Nostredame, was the most famous prophet of the French Renaissance, as well as an apothecary and physician. Born in Saint-Rémy-de-Provence, France, he was of reputed Jewish heritage.","homeIntro2":"In 1555, Nostradamus published his magnum opus Les Prophéties, containing 942 quatrains organized into ten groups called 'Centuries'. Written in an obscure mixture of Old French, Latin, and metaphor, these prophecies are believed to foretell major events from the 16th century through the end of the world.","homeIntro3":"For centuries, Nostradamus's prophecies have been continually reinterpreted. Supporters claim he successfully predicted the death of Henry II (1559), the Great Fire of London (1666), the French Revolution (1789), Napoleon's rise, Hitler and WWII, Hiroshima, JFK's assassination, and 9/11. Critics argue that the quatrains are vague enough to fit almost any historical event. This site compiles representative prophecies and evaluates their accuracy.","coreMessage":"Core Message","coreQuote":"\"I have spent long nights in study and have composed these prophecies for my dear son César Nostradamus. These prophecies are all derived from divine inspiration and astronomical calculations, extending to the year 3797.\" — Preface to Les Prophéties","keyPoints":"Key Timeline","kp2019":"2025 — Iron birds fly pilotless, silent voice spreads worldwide (Verified)","kp2035":"2026 — East forms new alliance, two great dragons shake hands","kp2038":"2030 — Third Antichrist arrives, reigns 27 years in rivers of blood","kp2048":"2040 — Rainbow unseen for 40 years, alternating droughts and floods","kp2060":"2060 — Divine word descends from heaven, great secret revealed","allTitle":"All Prophecies","allSubtitle":"{count} predictions in total","searchPlaceholder":"Search prophecies...","filterAll":"All","verifyTitle":"Prophecy Verification","verifySubtitle":"Evaluating predictions against reality for expired time points","statsTotal":"Total","statsVerified":"Verified","statsPartial":"Partial","statsFailed":"Failed","statsPending":"Pending","hitRate":"Hit Rate","realityLabel":"Reality Check","prophecyLabel":"Prophecy","yearLabel":"Predicted Year","footerNote":"Content compiled from public sources, for reference and discussion only. Nostradamus's quatrains are extremely obscure, with vastly different translations and interpretations. Many claimed 'fulfilled prophecies' may suffer from hindsight bias. Evaluations represent editorial opinions.","footerSource":"Reference Source"}};
  </script>
  <script>
const PROPHECIES = [{"id":1,"cat":"politics","q":"百诗集I-35：亨利二世之死（1559年）","a":"「年轻的狮子将战胜年迈的狮子，在单独的决斗场上。他将刺穿他的双眼于金色的笼中，两道伤口合为一，他在残酷的死亡中离去。」\n\n解读：这是诺斯特拉达穆斯最著名的已应验预言。法国国王亨利二世在1559年的庆典比武中，被年轻的蒙哥马利伯爵的长矛刺穿金色头盔面罩，碎片插入眼睛和太阳穴，十天后痛苦死去。","q_en":"Century I-35: Death of Henry II (1559)","a_en":"\"The young lion will overcome the older one, on the field of combat in a single battle. He will pierce his eyes through a golden cage, two wounds made one, then he dies a cruel death.\"\n\nInterpretation: This is Nostradamus's most famous verified prediction. King Henry II of France was fatally wounded in a 1559 jousting tournament when the young Count de Montgomery's lance shattered through the king's golden visor, piercing his eye and temple. He died ten days later in agony.","year":1559,"status":"verified","verdict_zh":"1559年6月30日，法国国王亨利二世在庆祝女儿婚礼的比武大会上，与年轻的蒙哥马利伯爵对决。蒙哥马利的长矛碎裂，碎片穿透亨利的金色头盔面罩，刺入眼睛和太阳穴，造成两处致命伤。亨利二世于7月10日去世。预言中「年轻的狮子」「金色笼子」「双重伤口」「残酷之死」均完全吻合。","verdict_en":"On June 30, 1559, King Henry II of France jousted against the young Count de Montgomery during celebrations for his daughter's wedding. Montgomery's lance shattered, piercing the king's golden visor and entering his eye and temple — two wounds in one. Henry died on July 10. The 'young lion', 'golden cage', 'two wounds made one', and 'cruel death' all match precisely."},{"id":2,"cat":"disaster","q":"百诗集II-51：伦敦大火（1666年）","a":"「正义者的鲜血将在伦敦被索求，在六十六年被闪电焚烧。古老的大教堂将从高处坠落，几座建筑也将被摧毁。」\n\n解读：「六十六年」直接对应1666年，伦敦大火烧毁了旧圣保罗大教堂和大量建筑。","q_en":"Century II-51: Great Fire of London (1666)","a_en":"\"The blood of the just shall be demanded of London, burnt by fire in the year '66. The ancient Dame shall fall from her high place, and many of the same sect shall be killed.\"\n\nInterpretation: The 'year 66' directly corresponds to 1666. The Great Fire of London destroyed Old St. Paul's Cathedral ('ancient Dame') and over 13,000 houses.","year":1666,"status":"verified","verdict_zh":"1666年9月2日至5日，伦敦大火从布丁巷的面包店蔓延，焚毁了城市的大部分区域，包括87座教堂和旧圣保罗大教堂（「古老的大教堂从高处坠落」），以及13200多间房屋。预言中的「六十六年」和伦敦被火焚烧的描述高度吻合。","verdict_en":"From September 2-5, 1666, the Great Fire of London spread from a bakery on Pudding Lane, destroying much of the city including 87 churches and Old St. Paul's Cathedral ('ancient Dame fell from high place'), plus over 13,200 houses. The reference to '66' and London burning match precisely."},{"id":3,"cat":"war","q":"百诗集IX-20：法国大革命（1789年）","a":"「夜间将经过兰斯森林，两对夫妇走弯路，王后是白色的石头。一位僧侣装扮的灰色国王在瓦伦尼。当选的卡佩引发暴风雨、火焰与流血。」\n\n解读：路易十六和玛丽·安托瓦内特试图经兰斯森林逃亡，在瓦伦尼被捕。「当选的卡佩」指波旁王朝（卡佩王朝分支），预言了革命的暴风雨。","q_en":"Century IX-20: French Revolution (1789)","a_en":"\"By night will come through the forest of Reines, two couples by a roundabout route, the Queen a white stone. A monk-king in grey at Varennes. Elected Cap causes tempest, fire, blood, and slice.\"\n\nInterpretation: Louis XVI and Marie Antoinette fled through the forest toward Reines but were captured at Varennes. 'Elected Cap' refers to the Bourbon/Capet dynasty. The revolution brought tempest, fire, and the guillotine ('slice').","year":1789,"status":"verified","verdict_zh":"1791年6月20日，路易十六和玛丽·安托瓦内特伪装出逃，试图经过兰斯附近的森林前往边境，但在瓦伦尼小镇被认出并逮捕。「僧侣装扮的灰色国王」准确描述了路易十六的伪装。法国大革命期间确实发生了暴风雨般的动荡、火焰和大量流血（断头台）。此预言明确提到了「瓦伦尼」这一地名，被认为是最有力的应验证据之一。","verdict_en":"On June 20, 1791, Louis XVI and Marie Antoinette disguised themselves and fled toward the border through forests near Reines, but were recognized and arrested in the town of Varennes. The 'monk-king in grey' accurately describes Louis's disguise. The Revolution indeed brought tempest, fire, and bloodshed (the guillotine). The specific mention of 'Varennes' is considered one of the strongest pieces of evidence for fulfillment."},{"id":4,"cat":"war","q":"百诗集I-60：拿破仑的崛起","a":"「一位皇帝将在意大利附近诞生，他将使帝国付出沉重代价。人们会说，与他结交的人，他不像王子，更像屠夫。」\n\n解读：拿破仑1769年出生于科西嘉岛（靠近意大利），他的帝国扩张导致了巨大的战争代价。","q_en":"Century I-60: Napoleon's Rise","a_en":"\"An Emperor shall be born near Italy, who shall cost the Empire dearly. They will say, when they see his allies, that he is less a prince than a butcher.\"\n\nInterpretation: Napoleon was born in 1769 in Corsica (near Italy). His imperial conquests came at enormous cost to France and Europe.","year":1799,"status":"partial","verdict_zh":"拿破仑1769年出生于科西嘉岛，地理上确实「在意大利附近」。他建立了法兰西帝国但最终使其付出沉重代价——数百万人在拿破仑战争中死亡。「不像王子，更像屠夫」与拿破仑的军事独裁形象部分吻合。但此预言语言较为笼统，可套用于多位历史人物。","verdict_en":"Napoleon was born in Corsica in 1769, geographically 'near Italy'. He established the French Empire at enormous cost — millions died in the Napoleonic Wars. 'Less a prince than a butcher' partially matches Napoleon's military dictator image. However, the language is general enough to apply to multiple historical figures."},{"id":5,"cat":"tech","q":"百诗集I-25：路易·巴斯德","a":"「失踪的、被隐藏了如此长时间之物终被找到。巴斯德将被尊为半神。这发生在月亮完成她的大周期之时，但他将被其他谣言所玷污。」\n\n解读：「巴斯德」（Pasteur）被直接提及，巴斯德发现了微生物致病原理，被尊为科学之神。","q_en":"Century I-25: Louis Pasteur","a_en":"\"Lost, found, hidden for so long a time, a pastor/Pasteur will be honored as a demigod. This is when the Moon completes her great cycle, but by other rumors he shall be dishonored.\"\n\nInterpretation: 'Pasteur' is directly named. Louis Pasteur discovered microbial pathogens — hidden knowledge found after being lost for ages — and was revered as a near-divine figure in science.","year":1885,"status":"partial","verdict_zh":"路易·巴斯德（Louis Pasteur, 1822-1895）发现了微生物与疾病的关系，发明了巴氏消毒法和狂犬疫苗，被尊为现代微生物学之父。原文中的「Pasteur」在法语中既是「牧羊人/牧师」也恰好是巴斯德的姓氏。「被隐藏很久的东西被发现」契合微生物学的突破。不过「Pasteur」一词本身有多重含义，是否特指巴斯德存在争议。","verdict_en":"Louis Pasteur (1822-1895) discovered the link between microbes and disease, invented pasteurization and the rabies vaccine, and is revered as the father of microbiology. 'Pasteur' in the original French means both 'pastor/shepherd' and happens to be Pasteur's surname. 'Hidden thing found' fits the microbiology breakthrough. However, the word has multiple meanings, so whether it specifically refers to Pasteur is debated."},{"id":6,"cat":"war","q":"百诗集II-24：希特勒的崛起","a":"「从西欧的深处，一个穷人家的孩子将诞生。他以演说蛊惑大批群众，他的名声将在东方王国回响。」\n\n另见III-35：「从欧洲最深处，一个年幼的孩子将在穷人中诞生。他以口舌之利诱惑大众，他在希斯特附近的生活地获得了更大名声。」\n\n解读：「希斯特」（Hister）被广泛认为是「希特勒」（Hitler）的变体。希特勒出生于奥地利（西欧深处），出身贫寒，以演说术蛊惑人心。","q_en":"Century II-24: Hitler's Rise","a_en":"\"From the depths of Western Europe, a young child will be born of poor people. He who by his tongue will seduce a great troop; his fame will increase towards the realm of the East.\"\n\nAlso III-35: \"From the deepest part of Europe, a young child born of poor people. He who by his speech will seduce a great multitude; his reputation grows near the realm of Hister.\"\n\nInterpretation: 'Hister' is widely believed to be a variant of 'Hitler'. Hitler was born in Austria (deep Western Europe), from humble origins, and seduced masses through oratory.","year":1939,"status":"partial","verdict_zh":"阿道夫·希特勒1889年出生于奥地利布劳瑙（「西欧深处」），家境贫寒。他以极富煽动性的演讲能力蛊惑了德国民众，建立了纳粹政权。「希斯特」（Hister）与「希特勒」（Hitler）仅一字之差。不过批评者指出，「Hister」实际上是多瑙河的古拉丁名，未必指人名。","verdict_en":"Adolf Hitler was born in 1889 in Braunau, Austria ('depths of Western Europe'), from a humble background. He seduced the German masses through powerful oratory and established the Nazi regime. 'Hister' differs from 'Hitler' by just one letter. However, critics note that 'Hister' is actually the ancient Latin name for the Danube River and may not refer to a person."},{"id":7,"cat":"war","q":"百诗集II-6：广岛与长崎（1945年）","a":"「在两座城市中，将出现前所未见的灾祸。饥荒、瘟疫降临，人们被铁手驱逐。向伟大的不朽之神哭泣求助。」\n\n解读：「两座城市中前所未见的灾祸」被认为是对广岛和长崎原子弹轰炸的预言。","q_en":"Century II-6: Hiroshima & Nagasaki (1945)","a_en":"\"Within two cities there will be scourges the like of which was never seen. Famine within plague, people driven out by steel. Crying to the great immortal God for relief.\"\n\nInterpretation: 'Two cities' experiencing unprecedented scourges is believed to refer to the atomic bombings of Hiroshima and Nagasaki.","year":1945,"status":"partial","verdict_zh":"1945年8月6日和9日，美国分别向广岛和长崎投下原子弹，造成约20万人死亡。这确实是人类历史上「前所未见的灾祸」。「铁手驱逐」可理解为核爆后的强制疏散。不过「两座城市遭灾」的描述过于笼统，可适用于许多历史事件。","verdict_en":"On August 6 and 9, 1945, the US dropped atomic bombs on Hiroshima and Nagasaki, killing approximately 200,000 people — truly 'scourges never seen before'. 'Driven out by steel' could describe forced evacuations after the blasts. However, 'two cities struck by disaster' is generic enough to apply to many historical events."},{"id":8,"cat":"politics","q":"百诗集I-26：肯尼迪遇刺（1963年）","a":"「伟大的人物将在白昼中被雷电击倒。邪恶的行为由恳求的持信者预言。根据预言，另一人在夜间倒下。热那亚、尼斯与摩纳哥的冲突。」\n\n解读：「伟大的人物在白昼被雷电击倒」被解读为肯尼迪在光天化日之下遭枪击。","q_en":"Century I-26: JFK Assassination (1963)","a_en":"\"The great man will be struck down in the day by a thunderbolt. An evil deed foretold by the bearer of a petition. According to the prediction, another falls at night. Conflict at Reims, London, and pestilence in Tuscany.\"\n\nInterpretation: 'Great man struck down by thunderbolt in the day' is interpreted as JFK being shot in broad daylight.","year":1963,"status":"partial","verdict_zh":"1963年11月22日，美国总统约翰·肯尼迪在达拉斯车队行进中遭枪击身亡，确实是「在白昼中被击倒」。「另一人在夜间倒下」可能指杰克·鲁比在夜间枪杀了嫌疑人奥斯瓦尔德。不过此预言的其他细节（热那亚、尼斯、摩纳哥）与肯尼迪事件无关。","verdict_en":"On November 22, 1963, President John F. Kennedy was shot dead during a motorcade in Dallas — indeed 'struck down in the day'. 'Another falls at night' may refer to Jack Ruby shooting suspect Oswald. However, other details in the quatrain (Genoa, Nice, Monaco) have no connection to the Kennedy assassination."},{"id":9,"cat":"disaster","q":"百诗集VI-97：911恐怖袭击（2001年）","a":"「天空将在北纬四十五度燃烧，火焰逼近伟大的新城。巨大的散落的火焰即刻跃起，当他们想要诺曼人的证据时。」\n\n另见X-72：「1999年7月，恐怖大王将从天而降。」\n\n解读：「伟大的新城」被解读为纽约（New York），「天空燃烧」对应世贸双塔的大火。纽约大约在北纬40-41度，接近「四十五度」。","q_en":"Century VI-97: 9/11 Attacks (2001)","a_en":"\"The sky will burn at forty-five degrees. Fire approaches the great New City. In an instant a great scattered flame leaps up, when one will want to demand proof of the Normans.\"\n\nAlso X-72: \"In the year 1999, seventh month, a great King of Terror will descend from the sky.\"\n\nInterpretation: 'Great New City' is interpreted as New York. 'Sky burning' corresponds to the Twin Towers ablaze. New York lies near latitude 40-41°, close to 'forty-five degrees'.","year":2001,"status":"partial","verdict_zh":"2001年9月11日，两架被劫持的客机撞击纽约世贸中心双子塔，造成近3000人死亡。「伟大的新城」确实可以指纽约（New York = 新城），「天空燃烧」和「巨大的火焰」与双塔大火的景象吻合。但纽约纬度约40-41度而非45度，且另一首相关预言（X-72）指定1999年7月而非2001年9月。","verdict_en":"On September 11, 2001, two hijacked planes struck the World Trade Center Twin Towers in New York, killing nearly 3,000. 'Great New City' could indeed mean New York, and 'sky burning' with 'great scattered flame' match the towers ablaze. However, NYC is at latitude 40-41° not 45°, and the related quatrain X-72 specifies July 1999, not September 2001."},{"id":10,"cat":"politics","q":"百诗集II-28：戴安娜王妃之死（1997年）","a":"「最后一位被尊崇之人倒在了同行者中间。将不再躺在金色的床上安息。她的伟大将被置于最低的深渊。」\n\n解读：「最后一位被尊崇之人」被解读为戴安娜王妃，她在巴黎隧道车祸中身亡，未能在宫殿（金色的床）中终老。","q_en":"Century II-28: Princess Diana's Death (1997)","a_en":"\"The last honored one among those of her rank falls in the midst of her companions. She will no longer rest on a golden bed. Her greatness will be placed in the lowest depths.\"\n\nInterpretation: 'Last honored one' is interpreted as Princess Diana, who died in a Paris tunnel car crash rather than in her palace ('golden bed').","year":1997,"status":"partial","verdict_zh":"1997年8月31日，戴安娜王妃在巴黎阿尔玛隧道中因车祸去世，同行的多迪·法耶兹也遇难。「不再躺在金色的床上安息」可理解为她脱离王室后不再享有王宫待遇。不过此预言描述过于模糊，可套用于多位历史名人的意外身亡。","verdict_en":"On August 31, 1997, Princess Diana died in a car crash in the Pont de l'Alma tunnel in Paris, along with Dodi Fayed. 'No longer rest on golden bed' could mean she left royal privilege behind. However, the description is vague enough to apply to many prominent figures who died unexpectedly."},{"id":11,"cat":"disaster","q":"百诗集II-53：新冠疫情（2020年）","a":"「海洋城市的大瘟疫将不会停止，直到被一个正义之人的死亡所报复。他因没有罪恶的缘故而被谴责和追捕。大女士因伪装而被愤怒所侮辱。」\n\n解读：「海洋城市的大瘟疫」被解读为源自沿海城市（武汉虽非沿海但通过长江连接海洋）的新冠疫情全球大流行。","q_en":"Century II-53: COVID-19 Pandemic (2020)","a_en":"\"The great plague of the maritime city will not cease until there be avenged the death of the just blood, condemned for a price without crime. The great lady outraged by the pretense.\"\n\nInterpretation: 'Great plague of the maritime city' is interpreted as the COVID-19 pandemic originating from a city connected to maritime routes.","year":2020,"status":"partial","verdict_zh":"2020年初，新冠疫情从中国武汉爆发并迅速蔓延全球，成为百年来最严重的大流行病。「大瘟疫」与新冠大流行的规模吻合。但「海洋城市」的描述并不精确，武汉是内陆城市。整体解读较为牵强。","verdict_en":"In early 2020, COVID-19 emerged from Wuhan, China, and became the worst pandemic in a century. 'Great plague' matches the scale of COVID-19. However, 'maritime city' does not precisely describe Wuhan, which is an inland city. The overall interpretation is somewhat strained."},{"id":12,"cat":"war","q":"百诗集IV-82：俄乌战争（2022年）","a":"「一支大军从斯拉沃尼亚前进。旧的毁灭者将摧毁一座城市。他将看到他的罗马尼亚十分荒凉，而后他将不知如何扑灭这巨大的火焰。」\n\n解读：「斯拉沃尼亚的大军」被解读为俄罗斯军队入侵乌克兰。「旧的毁灭者」指普京。","q_en":"Century IV-82: Ukraine War (2022)","a_en":"\"A great army from Slavonia will march. The old destroyer will ruin a city. He will see his Romania quite desolate, and then will not know how to extinguish the great flame.\"\n\nInterpretation: 'Army from Slavonia' is interpreted as Russian forces invading Ukraine. 'Old destroyer' may refer to Putin.","year":2022,"status":"partial","verdict_zh":"2022年2月24日，俄罗斯全面入侵乌克兰。「斯拉沃尼亚的大军」可泛指斯拉夫民族地区的军队，与俄军入侵吻合。马里乌波尔等城市确实遭到严重破坏。「不知如何扑灭火焰」可理解为战争的持续升级。但「斯拉沃尼亚」实际指克罗地亚的一个地区，地理上并非精确对应。","verdict_en":"On February 24, 2022, Russia launched a full-scale invasion of Ukraine. 'Army from Slavonia' broadly relates to Slavic lands, matching the Russian invasion. Cities like Mariupol were indeed devastated. 'Not know how to extinguish the flame' suggests escalation. However, 'Slavonia' actually refers to a region in Croatia, not a precise geographic match."},{"id":13,"cat":"politics","q":"百诗集VIII-1：法国宗教战争","a":"「保！那巨大的争斗！很多人将准备好。父亲反对儿子。伟大的将倒下。」\n\n解读：被认为预言了1562-1598年法国宗教战争中天主教与胡格诺教派的血腥冲突。","q_en":"Century VIII-1: French Wars of Religion","a_en":"\"Alas! What great conflict prepares! Many will be ready. Father against son. The great one will fall.\"\n\nInterpretation: Believed to predict the bloody conflict between Catholics and Huguenots during the French Wars of Religion (1562-1598).","year":1572,"status":"partial","verdict_zh":"1572年8月24日圣巴托罗缪之夜大屠杀，天主教徒杀害了数千名胡格诺教徒。法国宗教战争持续了三十多年，确实是「父亲反对儿子」的内战。但此预言描述过于笼统。","verdict_en":"The St. Bartholomew's Day Massacre on August 24, 1572, saw Catholics slaughter thousands of Huguenots. The French Wars of Religion lasted over 30 years — truly 'father against son'. However, the description is very general."},{"id":14,"cat":"politics","q":"百诗集IX-34：查理一世的处决（1649年）","a":"「孤独的丈夫将被加冕戴上主教法冠，他的归来，将面临新的冲突。在意大利有五百人之多。南特、萨勒诺和克利夫兰的公爵将被逮捕。」\n\n解读：「孤独的丈夫被戴冠」后面临冲突，被解读为英国国王查理一世在英国内战中被议会军击败并最终被处决。","q_en":"Century IX-34: Execution of Charles I (1649)","a_en":"\"The lone husband shall be mitered and crowned, his return shall cause conflict anew.\"\n\nInterpretation: The 'lone husband crowned' facing conflict is interpreted as King Charles I of England, defeated in the English Civil War and executed.","year":1649,"status":"partial","verdict_zh":"英国国王查理一世在英国内战中被议会军击败，1649年1月30日被公开处决——这是欧洲历史上罕见的国王被正式审判和斩首的事件。「孤独的丈夫」可指查理一世最终被孤立。但预言文本含糊，解读存在较大争议。","verdict_en":"King Charles I was defeated in the English Civil War and publicly executed on January 30, 1649 — a rare instance of a European monarch being formally tried and beheaded. 'Lone husband' could refer to Charles being isolated. However, the text is ambiguous and interpretations vary widely."},{"id":15,"cat":"disaster","q":"百诗集I-87：大地震","a":"「以地球中心之火震动的大地，将使新城周围颤抖。两块巨大的岩石将长期交战，然后阿瑞图萨将使新河变红。」\n\n解读：被解读为与地震相关的预言，可能指旧金山1906年大地震或其他重大地震事件。","q_en":"Century I-87: Great Earthquake","a_en":"\"Earth-shaking fire from the center of the Earth will cause tremors around the New City. Two great rocks will war for a long time, then Arethusa will redden a new river.\"\n\nInterpretation: Interpreted as an earthquake prophecy, possibly referring to the 1906 San Francisco earthquake or other major seismic events.","year":1906,"status":"partial","verdict_zh":"1906年4月18日，旧金山发生7.9级大地震，随后的大火摧毁了城市的80%。「新城」可指旧金山（较新的城市），「地球中心之火」指地震和火灾。但这一解读并非唯一可能。","verdict_en":"On April 18, 1906, a 7.9 magnitude earthquake struck San Francisco, and subsequent fires destroyed 80% of the city. 'New City' could refer to San Francisco, and 'earth-shaking fire' describes the quake and fires. However, this interpretation is not the only possibility."},{"id":16,"cat":"war","q":"百诗集III-57：英国君主制危机","a":"「七次变革的英国人，将在二百九十年间浸染鲜血。不再自由，日耳曼的支持也消失。白羊座怀疑他的保护者波兰。」\n\n解读：被解读为英国从1603年至1689年间经历的多次政治和宗教变革，包括内战、共和国和光荣革命。","q_en":"Century III-57: British Monarchy Crisis","a_en":"\"Seven times the British nation will change, stained with blood for two hundred and ninety years. Not at all free through Germanic support. Aries fears his protector Poland.\"\n\nInterpretation: Interpreted as Britain's political and religious upheavals from 1603-1689, including the Civil War, Republic, and Glorious Revolution.","year":1689,"status":"partial","verdict_zh":"英国在17世纪确实经历了多次重大政治变革：詹姆斯一世继位、查理一世被处决、克伦威尔共和国、查理二世复辟、光荣革命等。「七次变革」的说法大致吻合。「日耳曼的支持」可指汉诺威王朝。但具体细节仍有争议。","verdict_en":"Britain indeed underwent multiple major political changes in the 17th century: James I's accession, Charles I's execution, Cromwell's Commonwealth, Charles II's Restoration, and the Glorious Revolution. 'Seven changes' roughly matches. 'Germanic support' could refer to the House of Hanover. Specific details remain debated."},{"id":17,"cat":"war","q":"百诗集IV-68：美国独立战争","a":"「在距离大河不远之地，大地被海洋之水淹没。附近有五个地方，那片广袤的大陆将在伟大者的洪水和战争中沉沦。」\n\n解读：「大河」（密西西比河）附近的「伟大的大陆」上的「战争」被解读为美国独立战争。","q_en":"Century IV-68: American Revolution","a_en":"\"Not far from a great river, the earth submerged by sea waters. Near five parts, that great continent will sink in war and deluge of the great.\"\n\nInterpretation: A 'great continent' near a 'great river' (Mississippi) experiencing 'war' is interpreted as the American Revolution.","year":1776,"status":"partial","verdict_zh":"美国独立战争（1775-1783）确实发生在密西西比河附近的北美大陆。不过此预言的描述非常笼统，可以指代世界上许多地区的冲突。","verdict_en":"The American Revolution (1775-1783) did occur on the North American continent near the Mississippi River. However, this description is very general and could apply to conflicts in many regions of the world."},{"id":18,"cat":"disaster","q":"百诗集V-90：希腊之灾","a":"「在希腊群岛中将诞生如此残暴之人。他将被从皇位驱逐。一位国王将来到，他将在没有任何法律的情况下带来如此巨大的瘟疫。」\n\n解读：被解读为1821年希腊独立战争中奥斯曼帝国对希腊的残酷镇压。","q_en":"Century V-90: Calamity of Greece","a_en":"\"In the Greek islands shall be born one so cruel. He shall be driven from the throne. A king shall come who shall bring such a great plague without any law.\"\n\nInterpretation: Interpreted as Ottoman suppression during the Greek War of Independence in 1821.","year":1821,"status":"partial","verdict_zh":"1821年希腊独立战争期间，奥斯曼帝国对希腊进行了残酷镇压，造成大量平民伤亡。但此预言过于宽泛。","verdict_en":"During the Greek War of Independence in 1821, the Ottoman Empire brutally suppressed the Greeks, causing massive civilian casualties. However, the prediction is too broad."},{"id":19,"cat":"politics","q":"百诗集IX-16：佛朗哥统治西班牙","a":"「从卡斯提尔，弗朗哥将从集会中走出。大使们将表示不满。里维埃拉的追随者将陷入争斗。他们将拒绝这位伟大者进入海湾。」\n\n解读：「弗朗哥」（Franco）被直接提及，指西班牙独裁者弗朗西斯科·佛朗哥。","q_en":"Century IX-16: Franco Rules Spain","a_en":"\"From Castile, Franco will come forth from the assembly. The ambassadors will not agree. Those of Riviera will be in conflict. And they will refuse the great one entry into the Gulf.\"\n\nInterpretation: 'Franco' is directly named, referring to Spanish dictator Francisco Franco.","year":1939,"status":"partial","verdict_zh":"弗朗西斯科·佛朗哥（1892-1975）在西班牙内战后建立了长达36年的独裁统治（1939-1975）。「从卡斯提尔走出」与佛朗哥从西班牙内部崛起吻合。「弗朗哥」（Franco）的名字直接出现在原文中。不过「Franco」在古法语中也有「法兰克人/自由人」的含义。","verdict_en":"Francisco Franco (1892-1975) established a 36-year dictatorship after the Spanish Civil War (1939-1975). 'From Castile' matches Franco's rise from within Spain. 'Franco' appears directly in the text. However, 'Franco' also means 'Frankish/free' in Old French."},{"id":20,"cat":"war","q":"百诗集II-89：美苏冷战","a":"「两位伟大的领袖终将成为朋友。他们的伟大力量将不断增长。新大陆将处于权力的巅峰。对嗜血者而言，这个数字被记录下来。」\n\n解读：「两位伟大领袖」被解读为美国和苏联在二战中的同盟关系，之后各自力量增长并对峙。","q_en":"Century II-89: US-Soviet Cold War","a_en":"\"Two great leaders will finally become friends. Their great power will be seen to increase. The New World will be at the height of its power. To the bloody one, the number is recounted.\"\n\nInterpretation: 'Two great leaders' as US and Soviet alliance in WWII, then their power growing through the Cold War.","year":1947,"status":"partial","verdict_zh":"美国和苏联在二战中结为盟友，战后各自成为超级大国，开启了长达45年的冷战对峙。「新大陆处于权力巅峰」准确描述了战后美国的全球霸权地位。但预言的整体描述仍然比较笼统。","verdict_en":"The US and USSR allied during WWII and each became superpowers, launching a 45-year Cold War. 'New World at height of power' accurately describes post-war American global hegemony. But the overall description remains rather general."},{"id":21,"cat":"cosmic","q":"百诗集I-84：月球之面","a":"「月亮在夜晚的深处被遮蔽。她的年轻先知将被他的弟子看见。一整天行走在狂热的研究中。」\n\n解读：一些人将此解读为1969年阿波罗11号登月，「年轻先知」指宇航员阿姆斯特朗。","q_en":"Century I-84: Moon Landing","a_en":"\"The Moon obscured in deep darkness. Her young prophet seen by his disciple. A day on earth spent in fervent study.\"\n\nInterpretation: Some interpret this as the Apollo 11 Moon landing in 1969, with 'young prophet' as astronaut Armstrong.","year":1969,"status":"partial","verdict_zh":"1969年7月20日，阿波罗11号登月成功，阿姆斯特朗成为第一个踏上月球的人。「年轻先知被弟子看见」可理解为全世界通过电视见证了登月。但这一解读非常牵强。","verdict_en":"On July 20, 1969, Apollo 11 landed on the Moon and Armstrong became the first person to walk on it. 'Young prophet seen by disciples' could mean the world witnessed it on TV. However, this interpretation is quite a stretch."},{"id":22,"cat":"disaster","q":"百诗集X-72：1999年恐怖大王","a":"「1999年，第七个月。天空将降下一位恐怖大王，使蒙古大王复活。在此前后，马尔斯以幸运之名统治。」\n\n解读：这是诺斯特拉达穆斯最著名的带有明确日期的预言。许多人在1999年前对此恐慌不已。","q_en":"Century X-72: King of Terror in 1999","a_en":"\"In the year 1999, seventh month, from the sky will come a great King of Terror, to bring back to life the great King of the Mongols. Before and after Mars reigns by good luck.\"\n\nInterpretation: This is Nostradamus's most famous dated prophecy. Many feared it before 1999.","year":1999,"status":"failed","verdict_zh":"1999年7月并未发生任何与「恐怖大王从天而降」相对应的重大事件。虽然有人将其重新解读为1999年8月的日全食或后来的911事件（但时间相差两年），但就字面意义而言，此预言明确未应验。这也是诺斯特拉达穆斯极少数给出明确日期的预言之一。","verdict_en":"Nothing corresponding to a 'King of Terror descending from the sky' occurred in July 1999. While some reinterpret it as the August 1999 solar eclipse or the later 9/11 attacks (two years off), the literal prediction clearly failed. This is one of Nostradamus's very few prophecies with an explicit date."},{"id":23,"cat":"politics","q":"百诗集VIII-57：拿破仑的流放","a":"「从简单的士兵，他将成为帝国的主宰。短袍将变为长袍。勇于战斗，但对教会最不利。他困扰牧师，就像水浸透海绵。」\n\n解读：拿破仑从普通士兵升至皇帝（短袍变长袍），与教会关系紧张。","q_en":"Century VIII-57: Napoleon's Exile","a_en":"\"From a simple soldier, he will attain to Empire. He will exchange the short robe for the long. Brave in arms, much worse toward the Church. He vexes the priests as water fills a sponge.\"\n\nInterpretation: Napoleon rose from common soldier to Emperor ('short robe to long'), and had tense relations with the Church.","year":1804,"status":"partial","verdict_zh":"拿破仑1785年以少尉军衔开始军事生涯，1804年加冕为法兰西皇帝——确实是「从简单的士兵成为帝国的主宰」。他与教会关系复杂，曾幽禁教皇庇护七世。「短袍变长袍」生动描述了从军服到加冕礼袍的转变。","verdict_en":"Napoleon began his military career as a sub-lieutenant in 1785 and crowned himself Emperor in 1804 — truly 'from simple soldier to Empire'. He had complex relations with the Church, even imprisoning Pope Pius VII. 'Short robe to long' vividly describes the transition from military uniform to coronation robes."},{"id":24,"cat":"war","q":"百诗集V-8：发现新大陆后的战火","a":"「将会有被打开的巨大壮丽的废墟中留下的活的火焰。对于这些人来说，无辜者的鲜血将被谴责。太阳的影像燃烧着建筑。」\n\n解读：被解读为对美洲殖民战争和原住民遭到屠杀的预言。","q_en":"Century V-8: Wars After New World Discovery","a_en":"\"There will be unleashed live fire, hidden death, inside globes — horrible and frightful. By night the city reduced to rubble by the fleet. The city on fire, the enemy amenable.\"\n\nInterpretation: Interpreted as colonial wars and the destruction of indigenous peoples in the Americas.","year":1521,"status":"partial","verdict_zh":"西班牙征服者在16世纪摧毁了阿兹特克和印加帝国，大量原住民被杀害或死于欧洲带来的疾病。但此预言与殖民战争的具体关联较为牵强。","verdict_en":"Spanish conquistadors destroyed the Aztec and Inca empires in the 16th century, killing vast numbers of indigenous people through warfare and European diseases. However, the specific connection to this quatrain is tenuous."},{"id":25,"cat":"war","q":"百诗集III-97：阿拉伯之春","a":"「新法律将占据新的土地，在叙利亚、犹太和巴勒斯坦附近。伟大的野蛮帝国将崩溃，在太阳世纪确定之前。」\n\n解读：「叙利亚和巴勒斯坦附近的新法律」被解读为阿拉伯之春带来的政权更迭。","q_en":"Century III-97: Arab Spring","a_en":"\"A new law will occupy a new land, around Syria, Judea, and Palestine. The great barbarian empire will crumble before the century of the Sun is determined.\"\n\nInterpretation: 'New laws near Syria and Palestine' interpreted as the Arab Spring regime changes.","year":2011,"status":"partial","verdict_zh":"2011年阿拉伯之春从突尼斯蔓延至埃及、利比亚、叙利亚等国，多个政权被推翻或陷入内战。「叙利亚附近的新法律」与叙利亚内战的地理位置吻合。但「巴巴帝国崩溃」等细节并不精确。","verdict_en":"The 2011 Arab Spring spread from Tunisia to Egypt, Libya, Syria, and beyond, toppling regimes or sparking civil wars. 'New law near Syria' geographically matches. However, details like 'barbarian empire crumble' are not precise."},{"id":26,"cat":"disaster","q":"百诗集I-16：土星与农业之灾","a":"「土星在射手座与水的回合中出现，在其最高的升华之时。瘟疫、饥荒、由战争引起的死亡。世纪和时代都在更新。」\n\n解读：泛指多次出现的饥荒与瘟疫，可对应1348年黑死病等历史事件。","q_en":"Century I-16: Saturn and Agricultural Disaster","a_en":"\"Saturn in Sagittarius at the turn of the water. At its highest exaltation: plague, famine, death by war. The century and age are renewed.\"\n\nInterpretation: A general prediction of famine and plague, matching events like the Black Death of 1348.","year":1348,"status":"partial","verdict_zh":"1348年黑死病席卷欧洲，造成约三分之一至二分之一的欧洲人口死亡。「瘟疫、饥荒、战争」确实是中世纪欧洲的写照。但此诗描述的是星象条件下的一般灾难预言，并非针对具体事件。","verdict_en":"The Black Death swept across Europe in 1348, killing roughly one-third to one-half of Europe's population. 'Plague, famine, death by war' certainly describes medieval Europe. However, this is a general astrological disaster prediction, not targeted at specific events."},{"id":27,"cat":"politics","q":"百诗集I-43：政权更迭之前","a":"「在帝国改变之前，将发生极其不可思议的事件。田野将被移动，支撑它的柱子将被改变，取而代之的是新的柱子。」\n\n解读：被解读为苏联解体（1991年）之前的一系列剧变。","q_en":"Century I-43: Before the Change of Empire","a_en":"\"Before the change of Empire, a most marvelous event will take place. The field moved, the pillar of porphyry changed, placed upon the gnarled rock.\"\n\nInterpretation: Interpreted as the series of upheavals before the collapse of the Soviet Union (1991).","year":1991,"status":"partial","verdict_zh":"1991年苏联解体确实是20世纪最「不可思议的事件」之一。帝国的「支柱被改变」与苏联体制的崩塌相呼应。但此预言非常抽象，可以套用于历史上任何重大政权变更。","verdict_en":"The 1991 Soviet collapse was indeed one of the most 'marvelous events' of the 20th century. The 'pillar changed' echoes the collapse of the Soviet system. But this prediction is very abstract and could apply to any major regime change in history."},{"id":28,"cat":"religion","q":"百诗集V-46：教会的衰落","a":"「因为红衣主教们之间的争执不和。当被选出的萨宾人受到压迫时。他们将对抗他制造谣言。而伟大的老者将被冰冷地排除。」\n\n解读：被解读为天主教会内部改革和梵蒂冈危机。","q_en":"Century V-46: Decline of the Church","a_en":"\"By the quarrels and new disputes of cardinals. When the elected Sabine is oppressed. They will produce great rumors against him. And the great old one shall be frozen out.\"\n\nInterpretation: Interpreted as internal Church reform and Vatican crises.","year":2013,"status":"partial","verdict_zh":"2013年教皇本笃十六世成为600年来首位主动退位的教皇，被认为是「伟大的老者被排除」。红衣主教们围绕继任者选举确实发生了争议。不过此预言也可适用于历史上多次教会内部危机。","verdict_en":"In 2013, Pope Benedict XVI became the first pope in 600 years to voluntarily resign, seen as 'the great old one frozen out'. Cardinals indeed disputed over the succession. However, this prophecy could also apply to many historical Church crises."},{"id":29,"cat":"tech","q":"百诗集III-44：动物会说话","a":"「当动物对人类变得熟悉之时，在经历了巨大的痛苦之后，闪电落在了少女之上，并伴随着暴力攻击。」\n\n解读：「动物对人类变得熟悉」被一些人解读为人工智能和语音助手的发展——机器「说话」如同动物获得了语言。","q_en":"Century III-44: Animals Shall Speak","a_en":"\"When animals familiar to man begin to speak, after great pains and difficulty. The lightning to the virgin shall be harmful, taken from earth and suspended in the air.\"\n\nInterpretation: 'Animals familiar to man speaking' is interpreted by some as AI and voice assistants — machines 'speaking' as if animals gained language.","year":2023,"status":"partial","verdict_zh":"2022-2023年ChatGPT等大型语言模型的突破使AI能够与人类自然对话，某种意义上实现了「动物（机器）对人类说话」。但这一解读是典型的事后牵强附会。","verdict_en":"The 2022-2023 breakthrough of ChatGPT and large language models enabled AI to converse naturally with humans, in a sense fulfilling 'animals (machines) speaking to man'. But this interpretation is a classic case of post-hoc rationalization."},{"id":30,"cat":"cosmic","q":"百诗集II-46：重大天象事件","a":"「在天空中看到一颗大胡须星，在大瘟疫之后，三位伟大者将死去。灾难打击了大地，世界变得渺小。洪水过后，两个地方各自争斗。」\n\n解读：「大胡须星」指彗星，此预言被解读为与重大彗星出现同期的政治剧变。","q_en":"Century II-46: Great Celestial Event","a_en":"\"A great bearded star shall be seen in the sky. After the great plague, three great ones will die. The catastrophe strikes the earth; the world becomes small. After the flood, two places each in conflict.\"\n\nInterpretation: 'Great bearded star' refers to a comet. This prophecy is linked to political upheavals coinciding with major comet appearances.","year":1680,"status":"partial","verdict_zh":"1680年出现的大彗星是人类历史上最明亮的彗星之一，此后数年内多位欧洲重要领袖去世。但彗星出现后总有人去世，这种关联并不特别。","verdict_en":"The Great Comet of 1680 was one of the brightest in history, and several major European leaders died in subsequent years. But prominent deaths following comet appearances are not particularly unusual."},{"id":31,"cat":"war","q":"百诗集IV-75：准备战斗的人们","a":"「他将是准备好战斗的人。他将抛弃他的岗位。里昂的首领被其对手征服。」\n\n解读：被解读为一战期间法国的抵抗。「里昂首领被对手征服」指法国沦陷。","q_en":"Century IV-75: Those Ready to Fight","a_en":"\"He who was ready to fight shall desert his post. The chief of Lyon conquered by his adversary.\"\n\nInterpretation: Interpreted as French resistance during WWI. 'Chief of Lyon conquered' refers to France under siege.","year":1914,"status":"partial","verdict_zh":"第一次世界大战中法国确实经历了惨烈的战斗，但「里昂的首领被征服」并不精确——里昂并未沦陷。更多人将此解读为二战期间维希法国的投降。","verdict_en":"France endured horrific fighting in WWI, but 'chief of Lyon conquered' is inaccurate — Lyon was never conquered. Many interpret this instead as Vichy France's surrender in WWII."},{"id":32,"cat":"disaster","q":"百诗集VIII-17：突然富有者将遭灾","a":"「突然富有的人将被三重痛苦打倒。世界动荡不安。如此之多的背叛。」\n\n解读：被解读为2008年全球金融危机，「突然富有者」指金融投机者。","q_en":"Century VIII-17: The Suddenly Rich Will Suffer","a_en":"\"Those suddenly enriched shall be struck down by three wounds. The world in turmoil. So many betrayals.\"\n\nInterpretation: Interpreted as the 2008 global financial crisis, with 'suddenly rich' referring to financial speculators.","year":2008,"status":"partial","verdict_zh":"2008年全球金融危机中，华尔街投资银行和投机者遭遇巨大损失，雷曼兄弟倒闭。「世界动荡」准确描述了全球经济恐慌。但此预言极为笼统，可适用于任何金融危机。","verdict_en":"In the 2008 financial crisis, Wall Street banks and speculators suffered massive losses; Lehman Brothers collapsed. 'World in turmoil' fits the global economic panic. But the prediction is extremely generic and could apply to any financial crisis."},{"id":33,"cat":"war","q":"百诗集2025-1：残酷的战争与回归","a":"「残酷的战争正在准备中。在那一年，瘟疫比敌人更可怕。法国的年轻人将遭受可怕的苦难。」\n\n解读：被一些诺斯特拉达穆斯研究者解读为2025年的地缘政治紧张局势和可能的冲突升级。","q_en":"Quatrain 2025-1: Cruel Wars and Return","a_en":"\"Cruel wars are being prepared. In that year, the plague more terrible than enemies. The youth of France shall suffer terrible hardship.\"\n\nInterpretation: Some Nostradamus scholars interpret this as geopolitical tensions and possible conflict escalation in 2025.","year":2025,"status":"partial","verdict_zh":"2025年俄乌战争持续，但未爆发新的大规模瘟疫，法国青年也未遭受特别苦难。战争部分相符，瘟疫部分不符。","verdict_en":"The Russia-Ukraine war continued in 2025, but no major new plague emerged and French youth did not suffer specifically. War aspect partially matches, plague aspect does not."},{"id":34,"cat":"disaster","q":"百诗集2025-2：瘟疫比敌人更可怕","a":"「在许多地方瘟疫肆虐。痛苦比敌人的折磨更甚。最终所有人都将寻求新的庇护所。」\n\n解读：可能指2025年后出现的新型传染病或现有疫情的反复。","q_en":"Quatrain 2025-2: Plague Worse Than Enemies","a_en":"\"In many places the plague rages. Suffering worse than torment from the enemy. Finally all will seek new refuge.\"\n\nInterpretation: Possibly referring to new infectious diseases or recurring pandemics emerging after 2025.","year":2025,"status":"failed","verdict_zh":"2025年全球未爆发大规模新疫情，COVID-19已降级为常规流行病。","verdict_en":"No major new pandemic emerged globally in 2025. COVID-19 was downgraded to an endemic disease."},{"id":35,"cat":"politics","q":"百诗集2025-3：蜜蜂群四行诗","a":"「蜜蜂之王将失去他的蜂群。新的拿破仑不会被加冕。在三色旗之下，帝国将会改变。」\n\n解读：蜜蜂是拿破仑家族的象征。此预言被解读为2025年法国政治格局的重大变化或领导层更迭。","q_en":"Quatrain 2025-3: The Bee Swarm Quatrain","a_en":"\"The king of bees shall lose his swarm. The new Napoleon will not be crowned. Under the tricolor, the empire shall change.\"\n\nInterpretation: Bees are a Napoleonic symbol. Interpreted as major changes in French politics or leadership transition in 2025.","year":2025,"status":"partial","verdict_zh":"2025年法国经历政治动荡，但并未发生帝制改变或三色旗下的根本性变革。","verdict_en":"France experienced political turbulence in 2025, but no fundamental regime change occurred under the tricolor."},{"id":36,"cat":"war","q":"百诗集2025-4：七个月的战争","a":"「战争将持续七个月。人们因邪恶而死亡。鲁昂，埃夫勒不会向国王投降。」\n\n解读：一些解读者认为此预言指向2025年某场持续七个月的军事冲突。","q_en":"Quatrain 2025-4: Seven Months War","a_en":"\"War shall last seven months. People will die from wickedness. Rouen and Evreux will not surrender to the king.\"\n\nInterpretation: Some interpreters believe this points to a military conflict lasting seven months in 2025.","year":2025,"status":"failed","verdict_zh":"2025年未发生涉及鲁昂或埃夫勒的七个月战争。","verdict_en":"No seven-month war involving Rouen or Evreux occurred in 2025."},{"id":37,"cat":"cosmic","q":"百诗集2025-5：日食之兆","a":"「日食之日，怪兽将被看见。各有不同的解读：价格太高，无人准备。谁也没有料到会有这一天。」\n\n解读：2025年3月29日的日偏食以及2026年8月12日的日全食，被一些人与此预言联系起来。","q_en":"Quatrain 2025-5: Solar Eclipse Omen","a_en":"\"On the day of the eclipse, a monster shall be seen. Each interprets differently: the price too high, none prepared. No one expected this day.\"\n\nInterpretation: The partial solar eclipse of March 29, 2025, and the total solar eclipse of August 12, 2026, are linked to this prophecy by some.","year":2025,"status":"partial","verdict_zh":"2025年3月29日确实发生了日偏食，但未出现所谓的「怪兽」或重大灾变。日食天象部分应验。","verdict_en":"A partial solar eclipse did occur on March 29, 2025, but no 'monster' was sighted nor major catastrophe followed. The celestial event partially matches."},{"id":38,"cat":"disaster","q":"百诗集2025-6：水淹城市","a":"「伟大的城市将被水所淹没。海水将冲破堤坝。人们在屋顶上寻求庇护。」\n\n解读：被解读为2025-2026年极端气候导致的沿海城市洪灾。","q_en":"Quatrain 2025-6: Cities Flooded","a_en":"\"The great city will be flooded by water. The sea will breach the levees. People will seek refuge on rooftops.\"\n\nInterpretation: Interpreted as coastal city flooding from extreme climate events in 2025-2026.","year":2025,"status":"partial","verdict_zh":"2025年全球多地遭受极端暴雨和洪灾，但未出现某座标志性城市被完全淹没的事件。极端天气趋势部分应验。","verdict_en":"Multiple regions experienced extreme rainfall and flooding in 2025, but no iconic city was completely submerged. The trend of extreme weather partially matches."},{"id":39,"cat":"tech","q":"百诗集2025-7：铁鸟与无声之声","a":"「铁鸟将在没有人驾驶的情况下飞翔。无声之声将传遍整个世界。人们将与机器交谈，机器也将回应。」\n\n解读：「无人驾驶的铁鸟」指无人机和自动驾驶飞机，「无声之声」和「与机器交谈」指AI语音助手和大型语言模型的普及。","q_en":"Quatrain 2025-7: Iron Birds and Silent Voice","a_en":"\"Iron birds shall fly without a pilot. A silent voice will spread across the world. People will speak to machines, and the machines shall answer.\"\n\nInterpretation: 'Pilotless iron birds' as drones and autonomous aircraft; 'silent voice' and 'speaking to machines' as AI assistants and large language models.","year":2025,"status":"verified","verdict_zh":"2025年AI语音助手和大语言模型（ChatGPT、Claude等）已深度融入日常生活，自主无人机广泛部署。「人们将与机器交谈，机器也将回应」精准应验。","verdict_en":"By 2025, AI voice assistants and large language models (ChatGPT, Claude, etc.) became deeply integrated into daily life. Autonomous drones were widely deployed. 'People will speak to machines, and the machines shall answer' proved remarkably accurate."},{"id":40,"cat":"politics","q":"百诗集2026-1：东方的新联盟","a":"「东方将形成新的联盟。两条巨龙将握手言和。西方的鹰将感到不安。旧的秩序将被打破。」\n\n解读：「两条巨龙」被解读为中国和印度或中俄之间的战略联盟，对西方主导的国际秩序构成挑战。","q_en":"Quatrain 2026-1: New Alliance of the East","a_en":"\"The East will form a new alliance. Two great dragons shall shake hands. The eagle of the West will be uneasy. The old order shall be broken.\"\n\nInterpretation: 'Two dragons' as China-India or China-Russia strategic alliance challenging the Western-dominated international order.","year":2026,"status":"pending","verdict_zh":"","verdict_en":""},{"id":41,"cat":"disaster","q":"百诗集2026-2：火山之怒","a":"「沉睡已久的山将再次醒来。灰烬将覆盖天空，遮蔽太阳。附近的城市将被遗弃。」\n\n解读：被解读为2026年可能发生的重大火山喷发事件，可能指意大利维苏威火山或冰岛火山系统。","q_en":"Quatrain 2026-2: Wrath of the Volcano","a_en":"\"The long-sleeping mountain shall awaken once more. Ash will cover the sky, obscuring the sun. Nearby cities will be abandoned.\"\n\nInterpretation: Interpreted as a major volcanic eruption possibly in 2026, potentially referring to Italy's Vesuvius or Iceland's volcanic systems.","year":2026,"status":"pending","verdict_zh":"","verdict_en":""},{"id":42,"cat":"society","q":"百诗集2026-3：货币的终结","a":"「旧的货币将失去价值。新的交易方式将出现。不再需要携带金银。一切都将被数字所记录。」\n\n解读：被解读为数字货币和央行数字货币（CBDC）取代传统纸币的趋势。","q_en":"Quatrain 2026-3: End of Currency","a_en":"\"Old currency will lose its value. A new way of exchange will appear. No need to carry gold or silver. Everything shall be recorded in numbers.\"\n\nInterpretation: Interpreted as digital currencies and CBDCs replacing traditional paper money.","year":2026,"status":"pending","verdict_zh":"","verdict_en":""},{"id":43,"cat":"war","q":"百诗集2026-4：地中海的冲突","a":"「地中海将成为战争的舞台。船只在港口中燃烧。三个国家争夺一座岛屿。」\n\n解读：可能指地中海地区地缘政治紧张局势的升级，涉及领土争端。","q_en":"Quatrain 2026-4: Mediterranean Conflict","a_en":"\"The Mediterranean shall become a theater of war. Ships burn in the harbor. Three nations fight over an island.\"\n\nInterpretation: Possibly referring to escalating geopolitical tensions in the Mediterranean involving territorial disputes.","year":2026,"status":"pending","verdict_zh":"","verdict_en":""},{"id":44,"cat":"cosmic","q":"百诗集II-43：大彗星的来临","a":"「在大胡须星出现之际，三位伟大的王子将成为敌人。天空中的和平被从高处击碎。波河泛滥，弯曲的海岸上，蛇被安置。」\n\n解读：「大胡须星」指大彗星，此预言与未来重大彗星事件相关。","q_en":"Century II-43: The Great Comet","a_en":"\"During the appearance of the bearded star, the three great princes will be made enemies. Struck from the sky, peace on earth quakes. Po overflows, a serpent placed on the shore.\"\n\nInterpretation: 'Bearded star' means a great comet. This prophecy relates to a future major comet event.","year":2030,"status":"pending","verdict_zh":"","verdict_en":""},{"id":45,"cat":"war","q":"百诗集VIII-77：第三个敌基督","a":"「第三个敌基督即将来临，将比前两个更为可怕。他将在大血河中统治二十七年。」\n\n解读：诺斯特拉达穆斯据说预言了三位敌基督——拿破仑、希特勒是前两位，第三位尚未出现。","q_en":"Century VIII-77: The Third Antichrist","a_en":"\"The Third Antichrist soon to come, far more terrible than the first two. He shall reign twenty-seven years in rivers of blood.\"\n\nInterpretation: Nostradamus allegedly predicted three Antichrists — Napoleon and Hitler are the first two; the third has not yet appeared.","year":2030,"status":"pending","verdict_zh":"","verdict_en":""},{"id":46,"cat":"war","q":"百诗集III-59：第三次世界大战","a":"「野蛮的帝国被第三个篡夺。他将使大部分同类流血。他将在老年时死于一个国家之手。」\n\n解读：被解读为第三次世界大战的预言。第三个敌基督将引发全球性冲突。","q_en":"Century III-59: Third World War","a_en":"\"Barbarian empire usurped by the third. The greater part of his blood he will put to death. By senility, death through his country's hand.\"\n\nInterpretation: Interpreted as a Third World War prophecy. The third Antichrist will trigger a global conflict.","year":2035,"status":"pending","verdict_zh":"","verdict_en":""},{"id":47,"cat":"disaster","q":"百诗集I-17：气候大灾变","a":"「四十年间彩虹不会出现。四十年间它将被每天看到。干旱的土地将变得更加荒芜，饥荒之后将出现大洪水。」\n\n解读：被解读为全球气候变化导致的极端干旱和洪水交替出现。","q_en":"Century I-17: Climate Catastrophe","a_en":"\"For forty years the rainbow shall not appear. For forty years it will be seen every day. The dry earth will grow more parched, and great floods when it is seen.\"\n\nInterpretation: Interpreted as extreme droughts and floods alternating due to global climate change.","year":2040,"status":"pending","verdict_zh":"","verdict_en":""},{"id":48,"cat":"cosmic","q":"百诗集II-62：马比斯与大火","a":"「马比斯将很快死去，接着将发生一场可怕的人与兽的毁灭。然后突然间报复将被看到：百手、饥渴、当彗星经过之时。」\n\n解读：「马比斯」（Mabus）被一些人解读为第三个敌基督的名字的变体。其死亡将引发全球性灾难。","q_en":"Century II-62: Mabus and the Great Fire","a_en":"\"Mabus will soon die, then will come a horrible destruction of people and animals. Then suddenly vengeance will be seen: hundred hands, thirst, famine, when the comet passes.\"\n\nInterpretation: 'Mabus' is seen by some as an anagram for the Third Antichrist. His death triggers global catastrophe.","year":2040,"status":"pending","verdict_zh":"","verdict_en":""},{"id":49,"cat":"religion","q":"百诗集V-53：新的宗教法则","a":"「太阳和金星的法律将被争夺。借用先知的精神。两者的法律都不会被倾听。通过太阳，弥赛亚的法律将存续。」\n\n解读：预言未来宗教的融合与变革，可能出现新的全球性精神运动。","q_en":"Century V-53: New Religious Law","a_en":"\"The law of Sun and Venus shall be contended. Appropriating the spirit of prophecy. Neither one nor the other will be heard. The law of the great Messiah retained through the Sun.\"\n\nInterpretation: Predicts religious fusion and transformation, possibly a new global spiritual movement.","year":2050,"status":"pending","verdict_zh":"","verdict_en":""},{"id":50,"cat":"tech","q":"百诗集III-2：神圣之语从天而降","a":"「神圣的语言从天堂降临。它将不再前进。将会发生巨大的秘密。在下一个祭品来临之时。」\n\n解读：「从天而降的神圣之语」被一些人解读为卫星通信或太空中传来的信号——可能是地外文明的信号。","q_en":"Century III-2: Divine Word from the Sky","a_en":"\"The divine word shall descend from heaven. It shall not go further. There will be a great secret revealed at the time of the next offering.\"\n\nInterpretation: 'Divine word from heaven' interpreted by some as satellite communication or signals from space — possibly extraterrestrial.","year":2060,"status":"pending","verdict_zh":"","verdict_en":""},{"id":51,"cat":"disaster","q":"百诗集I-69：大山倒塌七个体育场","a":"「大山，直径七个体育场。在和平、战争、饥荒和洪水之后。它将向远方蔓延，摧毁大国，甚至连古老的遗迹和巨大的基础都将被摧毁。」\n\n解读：被解读为一颗巨大的小行星或彗星撞击地球的预言。","q_en":"Century I-69: Great Mountain Falls Seven Stadia","a_en":"\"The great mountain, seven stadia round. After peace, war, famine, flooding. It will spread far, drowning great countries. Even ancient foundations and their mighty ruins.\"\n\nInterpretation: Interpreted as a massive asteroid or comet impact on Earth.","year":2100,"status":"pending","verdict_zh":"","verdict_en":""},{"id":52,"cat":"cosmic","q":"百诗集I-46：阿格达附近的天象","a":"「非常靠近阿格达的地方，三兄弟之中。将摧毁大城市的东西将来自天空。」\n\n解读：预言未来天体事件对地球城市的威胁。","q_en":"Century I-46: Celestial Event Near Auch","a_en":"\"Very near Auch, among three brothers. That which will destroy the great city will come from the sky.\"\n\nInterpretation: Predicts a future celestial threat to earthly cities.","year":2150,"status":"pending","verdict_zh":"","verdict_en":""},{"id":53,"cat":"society","q":"百诗集III-94：五百年后被遗忘","a":"「在过去五百年之后，他将不再被计算。他将是那个时代的装饰品。然后突然间伟大的光明将出现，使那个世纪的人们非常满意。」\n\n解读：诺斯特拉达穆斯可能在预言自己——出版《百诗集》500年后（约2055年），他将被重新发现或重新评价。","q_en":"Century III-94: Forgotten After 500 Years","a_en":"\"For more than five hundred years, he shall not be reckoned. He who was the ornament of his time. Then suddenly great clarity shall emerge, making those of that century very content.\"\n\nInterpretation: Nostradamus may be predicting himself — 500 years after Les Prophéties (c. 2055), he will be rediscovered or reevaluated.","year":2055,"status":"pending","verdict_zh":"","verdict_en":""},{"id":54,"cat":"religion","q":"百诗集X-74：第七个大数完成之年","a":"「在第七个大数完成的一年。它将出现在祭献的时刻。不远于大千禧年。死者将从坟墓中走出。」\n\n解读：「第七个大数」被一些人解读为公元7000年或其他计算方式。这是诺斯特拉达穆斯最具末世色彩的预言之一。","q_en":"Century X-74: The Seventh Great Number","a_en":"\"The year the great seventh number is accomplished. It will appear at the time of the games of slaughter. Not far from the great millennial age. When the dead will come out of their graves.\"\n\nInterpretation: 'Seventh great number' is interpreted by some as the year 7000 or through other calculations. One of Nostradamus's most apocalyptic prophecies.","year":2242,"status":"pending","verdict_zh":"","verdict_en":""},{"id":55,"cat":"cosmic","q":"百诗集I-48：月球时代","a":"「二十年的月亮统治已经过去。七千年后另一个将掌权。当太阳取回它的日子。那时我的预言就会结束并完成。」\n\n解读：诺斯特拉达穆斯暗示他的预言将延续到公元7000年左右，之后将进入新时代。","q_en":"Century I-48: Age of the Moon","a_en":"\"Twenty years of the Moon's reign have passed. Seven thousand years another shall hold his monarchy. When the Sun takes up his remaining days. Then is my prophecy accomplished and done.\"\n\nInterpretation: Nostradamus suggests his prophecies extend to approximately the year 7000, after which a new age begins.","year":3000,"status":"pending","verdict_zh":"","verdict_en":""},{"id":56,"cat":"war","q":"百诗集VI-24：长期和平后的战争","a":"「在长时期的和平赞美之后，将降临灾厄。在整个意大利和法国的大地上。血、火、瘟疫、死亡。」\n\n解读：预言未来欧洲在经历长期和平后将再次陷入大规模冲突。","q_en":"Century VI-24: War After Long Peace","a_en":"\"After a long period of peace praised, throughout Italy and France, blood, fire, plague, and death.\"\n\nInterpretation: Predicts Europe falling into large-scale conflict again after a long period of peace.","year":2080,"status":"pending","verdict_zh":"","verdict_en":""},{"id":57,"cat":"society","q":"百诗集III-4：战争之后的和平时代","a":"「当月亮的缺陷近在眼前时，彼此之间的距离并不遥远。寒冷、干旱、危险靠近边境。即使在先知起源之地亦然。」\n\n解读：预言人类在经历多次战争和灾难后，最终迎来一个和平时代。","q_en":"Century III-4: Age of Peace After Wars","a_en":"\"When the deficiency of the Moon approaches, they are not far from each other. Cold, drought, danger near the frontiers. Even where the oracle has its origin.\"\n\nInterpretation: Predicts humanity eventually reaching an age of peace after enduring many wars and disasters.","year":2200,"status":"pending","verdict_zh":"","verdict_en":""},{"id":58,"cat":"cosmic","q":"诺斯特拉达穆斯的终极预言：公元3797年","a":"「我的预言将延续至公元3797年。」——诺斯特拉达穆斯在《百诗集》序言中的声明。\n\n解读：诺斯特拉达穆斯在致其子凯撒的序言中明确表示，他的预言时间跨度延续到公元3797年，被一些人解读为世界末日之年。","q_en":"Nostradamus's Ultimate Prophecy: Year 3797","a_en":"\"My prophecies shall extend to the year 3797 AD.\" — Nostradamus's statement in the Preface to Les Prophéties.\n\nInterpretation: In his preface addressed to his son César, Nostradamus explicitly stated that his prophecies span to 3797 AD, interpreted by some as the year of the end of the world.","year":3797,"status":"pending","verdict_zh":"","verdict_en":""},{"id":59,"cat":"disaster","q":"百诗集I-56：大地的巨变","a":"「你将早晚看到巨大的变化。极端的恐怖和报复。月亮在其天使的引导下，天空接近倾斜。」\n\n解读：预言地球将经历一次巨大的地质或天文变化，可能是地轴偏移或极端天气。","q_en":"Century I-56: Great Change of the Earth","a_en":"\"Sooner and later you will see great changes made. Extreme horrors and vengeances. For as the Moon is led by its angel, the heavens draw near to the Balance.\"\n\nInterpretation: Predicts Earth undergoing a massive geological or astronomical change, possibly axis shift or extreme weather.","year":2500,"status":"pending","verdict_zh":"","verdict_en":""},{"id":60,"cat":"religion","q":"百诗集X-42：人类的最终命运","a":"「人类的王国是天使般的统治。它将使和平与统一。被囚禁了一半的战争。人们将在和平中长久安息。」\n\n解读：这是诺斯特拉达穆斯少有的乐观预言，暗示人类最终将实现持久和平，进入「天使般的统治」时代。","q_en":"Century X-42: Humanity's Final Destiny","a_en":"\"The human realm of angelic governance. It will cause peace and unity. War captive halfway through. For a long time peace will be maintained.\"\n\nInterpretation: One of Nostradamus's rare optimistic prophecies, suggesting humanity will ultimately achieve lasting peace and enter an era of 'angelic governance'.","year":3500,"status":"pending","verdict_zh":"","verdict_en":""}];

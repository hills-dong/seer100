<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 186 28" height="20">
  <!-- Alchemical retort/flask icon -->
  <!-- Flask body -->
  <circle cx="14" cy="17" r="8" fill="#8c6914"/>
  <!-- Flask neck -->
  <path d="M11 9 L11 4 L17 4 L17 9" fill="#8c6914"/>
  <!-- Flask neck curve connecting to body -->
  <path d="M11 9 Q11 12 8 14" fill="none" stroke="#8c6914" stroke-width="2"/>
  <path d="M17 9 Q17 12 20 14" fill="none" stroke="#8c6914" stroke-width="2"/>
  <!-- Flask rim -->
  <path d="M9 4 L19 4" fill="none" stroke="#6a4e0a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Inner circle detail -->
  <circle cx="14" cy="18" r="4" fill="#f4f0e8"/>
  <!-- Alchemical cross/plus inside -->
  <path d="M14 15.5 L14 20.5 M11.5 18 L16.5 18" fill="none" stroke="#6a4e0a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Text -->
  <text x="32" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#6a4e0a" letter-spacing="0.5">PARACELSUS</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 138 28" height="20">
  <!-- Half-human, half-android face -->
  <!-- Face outline -->
  <circle cx="14" cy="14" r="11" fill="none" stroke="#7a5080" stroke-width="1.5"/>
  <!-- Dividing line down the center -->
  <line x1="14" y1="3" x2="14" y2="25" stroke="#5c3660" stroke-width="1"/>
  <!-- Human side (left) - eye and subtle features -->
  <circle cx="10" cy="12" r="1.8" fill="#5c3660"/>
  <path d="M7 18 Q10 21 13 18" fill="none" stroke="#5c3660" stroke-width="1" stroke-linecap="round"/>
  <!-- Android side (right) - circuit eye and grid lines -->
  <rect x="16" y="10" width="3.6" height="3.6" rx="0.5" fill="none" stroke="#7a5080" stroke-width="1"/>
  <circle cx="17.8" cy="11.8" r="0.8" fill="#7a5080"/>
  <line x1="19.6" y1="8" x2="22" y2="8" stroke="#7a5080" stroke-width="0.8"/>
  <line x1="22" y1="8" x2="22" y2="13" stroke="#7a5080" stroke-width="0.8"/>
  <line x1="19.6" y1="18" x2="21" y2="18" stroke="#7a5080" stroke-width="0.8"/>
  <line x1="21" y1="18" x2="21" y2="21" stroke="#7a5080" stroke-width="0.8"/>
  <!-- Text -->
  <text x="32" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#5c3660" letter-spacing="0.5">P.K. DICK</text>
</svg>

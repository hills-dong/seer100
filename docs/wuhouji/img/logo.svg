<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 28" height="20">
  <!-- Ji pen (乩笔) - T-shaped spirit writing stylus -->
  <!-- Vertical shaft -->
  <rect x="12.5" y="8" width="3" height="16" rx="1" fill="#7a5a3a"/>
  <!-- Horizontal crossbar -->
  <rect x="5" y="4" width="18" height="3" rx="1.5" fill="#5c4028"/>
  <!-- Tip of the pen (writing point) -->
  <polygon points="14,24 11.5,27 16.5,27" fill="#5c4028"/>
  <!-- Small circle at crossbar center (pivot joint) -->
  <circle cx="14" cy="5.5" r="1.8" fill="#f2f0ea"/>
  <circle cx="14" cy="5.5" r="1.8" fill="none" stroke="#5c4028" stroke-width="0.6"/>
  <!-- Sand tray base line -->
  <line x1="4" y1="27.5" x2="24" y2="27.5" stroke="#7a5a3a" stroke-width="0.8"/>
  <!-- Text: 百年乩 -->
  <text x="32" y="20" font-family="'Noto Serif SC', 'Source Han Serif CN', 'SimSun', Georgia, serif" font-size="18" font-weight="bold" fill="#7a5a3a" letter-spacing="2">百年乩</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 28" height="20">
  <!-- Wheel within a wheel (Merkabah) -->
  <!-- Outer wheel -->
  <circle cx="14" cy="14" r="11.5" fill="none" stroke="#6a4a3a" stroke-width="2"/>
  <!-- Inner wheel (rotated, crossing the outer) -->
  <ellipse cx="14" cy="14" rx="7" ry="11.5" fill="none" stroke="#4e3024" stroke-width="1.5"/>
  <!-- Hub -->
  <circle cx="14" cy="14" r="2.5" fill="#6a4a3a"/>
  <!-- Spokes on outer wheel -->
  <line x1="14" y1="2.5" x2="14" y2="6" stroke="#6a4a3a" stroke-width="1"/>
  <line x1="14" y1="22" x2="14" y2="25.5" stroke="#6a4a3a" stroke-width="1"/>
  <line x1="2.5" y1="14" x2="6" y2="14" stroke="#6a4a3a" stroke-width="1"/>
  <line x1="22" y1="14" x2="25.5" y2="14" stroke="#6a4a3a" stroke-width="1"/>
  <!-- Text -->
  <text x="32" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#4e3024" letter-spacing="0.5">EZEKIEL</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 138 28" height="20">
  <!-- Hourglass icon with digital/pixelated sand -->
  <!-- Top triangle -->
  <polygon points="5,3 23,3 14,14" fill="#5a5a8c"/>
  <!-- Bottom triangle -->
  <polygon points="5,25 23,25 14,14" fill="#3e3e6a"/>
  <!-- Top cap -->
  <rect x="3" y="2" width="22" height="2" rx="1" fill="#3e3e6a"/>
  <!-- Bottom cap -->
  <rect x="3" y="24" width="22" height="2" rx="1" fill="#3e3e6a"/>
  <!-- Center pinch highlight -->
  <circle cx="14" cy="14" r="1.5" fill="#f0f0f4"/>
  <!-- Digital sand dots - top -->
  <rect x="12" y="5" width="1.5" height="1.5" fill="#f0f0f4"/>
  <rect x="15" y="6" width="1.5" height="1.5" fill="#f0f0f4"/>
  <rect x="10" y="6" width="1.5" height="1.5" fill="#f0f0f4"/>
  <!-- Digital sand dots - bottom -->
  <rect x="12" y="21" width="1.5" height="1.5" fill="#5a5a8c"/>
  <rect x="15" y="20" width="1.5" height="1.5" fill="#5a5a8c"/>
  <rect x="10" y="20" width="1.5" height="1.5" fill="#5a5a8c"/>
  <!-- Text -->
  <text x="32" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#3e3e6a" letter-spacing="0.5">KFK 2075</text>
</svg>

    <noscript><h1>巴巴·万加预言 预言全集</h1><p>共 71 条问答</p>

<div class="prophecy-item"><div class="prophecy-header"><span class="prophecy-id">#2</span> <span class="prophecy-cat"><i class="i-climate"></i> 气候</span> <span class="prophecy-year-tag">2000</span></div><div class="prophecy-q">1980年，万加提到库尔斯克</div><div class="prophecy-a"><span class="kfk-name">Baba Vanga: </span>「在1999年8月，库尔斯克将被淹没在水下，整个世界都会为之哀悼。」</div></div>

<div class="verify-item verified"><div class="verify-header"><span class="prophecy-id">#4</span> <span class="status-badge verified"><i class="i-verified"></i> 已应验</span> <span class="verify-year">预言时间点: 1984</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">1969年，万加对印度总理英迪拉·甘地发出警告</div><div class="verify-a"><strong>Baba Vanga:</strong> 「裙子会毁了她。我在烟火中看见一件橙黄色的裙子。」</div></div><div><div class="verify-verdict">1984年10月31日，英迪拉·甘地遭锡克教卫士刺杀身亡时，身穿一件藏红色（橙黄色）纱丽。</div></div></div></div>
<div class="verify-item verified"><div class="verify-header"><span class="prophecy-id">#5</span> <span class="status-badge verified"><i class="i-verified"></i> 已应验</span> <span class="verify-year">预言时间点: 1996</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">万加预言自己的死亡日期</div><div class="verify-a"><strong>Baba Vanga:</strong> 「我将在1996年8月11日离开。」</div></div><div><div class="verify-verdict">万加在1990年的一次采访中准确预言了自己的死亡日期。她于1996年8月11日去世，享年85岁。</div></div></div></div>
<div class="verify-item verified"><div class="verify-header"><span class="prophecy-id">#2</span> <span class="status-badge verified"><i class="i-verified"></i> 已应验</span> <span class="verify-year">预言时间点: 2000</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">1980年，万加提到库尔斯克</div><div class="verify-a"><strong>Baba Vanga:</strong> 「在1999年8月，库尔斯克将被淹没在水下，整个世界都会为之哀悼。」</div></div><div><div class="verify-verdict">当时人们以为她说的是库尔斯克市。但2000年8月12日，俄罗斯核潜艇「库尔斯克号」在巴伦支海沉没，118名船员全部遇难。时间差了约一年，但事件细节高度吻合。</div></div></div></div>
<div class="verify-item verified"><div class="verify-header"><span class="prophecy-id">#1</span> <span class="status-badge verified"><i class="i-verified"></i> 已应验</span> <span class="verify-year">预言时间点: 2001</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">1989年，万加对美国发出警告</div><div class="verify-a"><strong>Baba Vanga:</strong> 「恐怖啊，恐怖！美国的兄弟将在钢铁之鸟的攻击下倒塌。丛林中的狼群将嚎叫。无辜者的鲜血将四处喷溅。」</div></div><div><div class="verify-verdict">2001年9月11日，两架被劫持的客机（钢铁之鸟）撞击纽约世贸中心双子塔（美国兄弟），造成近3000人死亡。这是万加最广为人知的应验预言。</div></div></div></div>
<div class="verify-item partial"><div class="verify-header"><span class="prophecy-id">#3</span> <span class="status-badge partial"><i class="i-partial"></i> 部分相关</span> <span class="verify-year">预言时间点: 2008</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">万加曾预言美国第44任总统</div><div class="verify-a"><strong>Baba Vanga:</strong> 「第44任美国总统将是一位非裔美国人。但他也将是最后一位总统。」</div></div><div><div class="verify-verdict">2008年巴拉克·奥巴马当选美国第44任总统，确实是首位非裔总统。但「最后一位总统」的说法并未应验，美国此后继续有新总统当选。</div></div></div></div>
<div class="verify-item failed"><div class="verify-header"><span class="prophecy-id">#7</span> <span class="status-badge failed"><i class="i-failed"></i> 未应验</span> <span class="verify-year">预言时间点: 2010</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">万加预言第三次世界大战</div><div class="verify-a"><strong>Baba Vanga:</strong> 「第三次世界大战将从2010年11月开始，至2014年10月结束。战争最初使用常规武器，之后将使用核武器和化学武器。」</div></div><div><div class="verify-verdict">2010年至2014年间并未爆发第三次世界大战。虽然这段时期有阿拉伯之春和叙利亚内战等冲突，但远未达到世界大战的规模。</div></div></div></div>

const I18N = {"zh":{"siteTitle":"巴巴·万加预言","siteSubtitle":"保加利亚盲眼预言家（1911-1996）","navHome":"预言介绍","navAll":"预言全集","navVerify":"预言验证","homeTitle":"巴巴·万加是谁？","homeIntro1":"巴巴·万加（Baba Vanga，1911年1月31日—1996年8月11日），本名万格莉亚·潘德娃·古什特洛娃，是保加利亚著名的盲眼预言家、神秘学家与草药师。她12岁时在一场龙卷风中失明，此后据称获得了预见未来的能力。","homeIntro2":"在她漫长的一生中，万加留下了大量关于人类未来的预言，时间跨度从近未来一直延伸到5079年——她预言的世界末日之年。她的预言涵盖自然灾害、战争冲突、科技革命、宇宙探索和人类文明演变等领域。","homeIntro3":"万加的一些预言已被现实印证，包括911恐怖袭击、库尔斯克号潜艇沉没、奥巴马当选总统等。她被许多人称为「保加利亚的诺斯特拉达穆斯」。本站整理了她的85条预言，并对已到期的预言进行了真实度评估。","coreMessage":"核心信息","coreQuote":"「一切都将像冰一样融化，唯有一样东西将保持完好无损——弗拉基米尔的荣耀，俄罗斯的荣耀……一切都会在某一天消逝，但弗拉基米尔的荣耀将永存。」","keyPoints":"关键时间节点","kp2019":"2025年 —— 欧洲爆发战争冲突，人口稀少","kp2035":"2028年 —— 新能源被发现，世界饥荒消除","kp2038":"2130年 —— 在外星人帮助下建立海底文明","kp2048":"3797年 —— 地球上所有生命消失，人类殖民新星系","kp2060":"5079年 —— 世界末日","allTitle":"预言全集","allSubtitle":"共 {count} 条预言","searchPlaceholder":"搜索预言内容...","filterAll":"全部","verifyTitle":"预言验证","verifySubtitle":"对已到期的预言时间点进行真实度评估","statsTotal":"收录总数","statsVerified":"已应验","statsPartial":"部分相关","statsFailed":"未应验","statsPending":"待验证","hitRate":"应验率","realityLabel":"现实情况","prophecyLabel":"预言内容","yearLabel":"预言时间点","footerNote":"本站内容整理自公开资料，仅供参考与讨论。巴巴·万加的许多预言无法追溯到可靠的第一手文献，部分可能为后人附会。验证评价仅代表编者观点。","footerSource":"参考来源"},"en":{"siteTitle":"Baba Vanga Prophecies","siteSubtitle":"Bulgarian Blind Mystic (1911-1996)","navHome":"Background","navAll":"All Prophecies","navVerify":"Verification","homeTitle":"Who is Baba Vanga?","homeIntro1":"Baba Vanga (January 31, 1911 – August 11, 1996), born Vangelia Pandeva Gushterova, was a Bulgarian blind mystic, herbalist, and alleged clairvoyant. She lost her sight at age 12 during a tornado, after which she reportedly gained the ability to foresee the future.","homeIntro2":"Throughout her long life, Vanga left numerous prophecies about humanity's future, spanning from the near future to the year 5079 — her predicted date for the end of the world. Her predictions cover natural disasters, wars, technological revolutions, space exploration, and the evolution of human civilization.","homeIntro3":"Some of Vanga's predictions have been confirmed by real events, including the 9/11 attacks, the Kursk submarine disaster, and Obama's presidency. She is often called the 'Bulgarian Nostradamus'. This site compiles 85 of her prophecies and evaluates those whose deadlines have passed.","coreMessage":"Core Message","coreQuote":"\"Everything will melt like ice, yet the glory of Vladimir, the glory of Russia, shall remain intact... Everything will pass, but the glory of Vladimir shall endure.\"","keyPoints":"Key Timeline","kp2019":"2025 — War erupts in Europe, sparse population","kp2035":"2028 — New energy source discovered, world hunger eliminated","kp2038":"2130 — Underwater civilizations built with alien help","kp2048":"3797 — All life on Earth disappears, humans colonize new solar system","kp2060":"5079 — End of the world","allTitle":"All Prophecies","allSubtitle":"{count} predictions in total","searchPlaceholder":"Search prophecies...","filterAll":"All","verifyTitle":"Prophecy Verification","verifySubtitle":"Evaluating predictions against reality for expired time points","statsTotal":"Total","statsVerified":"Verified","statsPartial":"Partial","statsFailed":"Failed","statsPending":"Pending","hitRate":"Hit Rate","realityLabel":"Reality Check","prophecyLabel":"Prophecy","yearLabel":"Predicted Year","footerNote":"Content compiled from public sources, for reference and discussion only. Many of Baba Vanga's predictions cannot be traced to reliable first-hand sources and some may be later attributions. Evaluations represent editorial opinions.","footerSource":"Reference Source"}};
  </script>
  <script>
const PROPHECIES = [{"id":1,"cat":"war","q":"1989年，万加对美国发出警告","a":"「恐怖啊，恐怖！美国的兄弟将在钢铁之鸟的攻击下倒塌。丛林中的狼群将嚎叫。无辜者的鲜血将四处喷溅。」","q_en":"In 1989, Vanga warned about America","a_en":"\"Horror, horror! The American brethren will fall after being attacked by the steel birds. The wolves will be howling in the bush. Innocent blood will gush.\"","year":2001,"status":"verified","verdict_zh":"2001年9月11日，两架被劫持的客机（钢铁之鸟）撞击纽约世贸中心双子塔（美国兄弟），造成近3000人死亡。这是万加最广为人知的应验预言。","verdict_en":"On September 11, 2001, two hijacked planes ('steel birds') struck the Twin Towers ('American brethren') of the World Trade Center in New York, killing nearly 3,000 people. This is Vanga's most widely cited fulfilled prediction."},{"id":2,"cat":"climate","q":"1980年，万加提到库尔斯克","a":"「在1999年8月，库尔斯克将被淹没在水下，整个世界都会为之哀悼。」","q_en":"In 1980, Vanga mentioned Kursk","a_en":"\"In August 1999, Kursk will be covered with water, and the whole world will weep over it.\"","year":2000,"status":"verified","verdict_zh":"当时人们以为她说的是库尔斯克市。但2000年8月12日，俄罗斯核潜艇「库尔斯克号」在巴伦支海沉没，118名船员全部遇难。时间差了约一年，但事件细节高度吻合。","verdict_en":"People assumed she meant the city of Kursk. But on August 12, 2000, the Russian nuclear submarine 'Kursk' sank in the Barents Sea, killing all 118 crew members. The timing was off by about one year, but the event details match remarkably."},{"id":3,"cat":"politics","q":"万加曾预言美国第44任总统","a":"「第44任美国总统将是一位非裔美国人。但他也将是最后一位总统。」","q_en":"Vanga predicted the 44th US president","a_en":"\"The 44th American president will be a Black man. But he will also be the last president.\"","year":2008,"status":"partial","verdict_zh":"2008年巴拉克·奥巴马当选美国第44任总统，确实是首位非裔总统。但「最后一位总统」的说法并未应验，美国此后继续有新总统当选。","verdict_en":"Barack Obama was elected 44th US president in 2008, indeed the first African-American president. However, the claim of being 'the last president' did not come true, as the US has continued to elect new presidents."},{"id":4,"cat":"politics","q":"1969年，万加对印度总理英迪拉·甘地发出警告","a":"「裙子会毁了她。我在烟火中看见一件橙黄色的裙子。」","q_en":"In 1969, Vanga warned Indian PM Indira Gandhi","a_en":"\"The dress will destroy her. I see an orange-yellow dress in the smoke and fire.\"","year":1984,"status":"verified","verdict_zh":"1984年10月31日，英迪拉·甘地遭锡克教卫士刺杀身亡时，身穿一件藏红色（橙黄色）纱丽。","verdict_en":"On October 31, 1984, Indira Gandhi was assassinated by her Sikh bodyguards. She was wearing a saffron-hued (orange-yellow) saree at the time of her death."},{"id":5,"cat":"spirit","q":"万加预言自己的死亡日期","a":"「我将在1996年8月11日离开。」","q_en":"Vanga predicted her own death","a_en":"\"I will depart on August 11, 1996.\"","year":1996,"status":"verified","verdict_zh":"万加在1990年的一次采访中准确预言了自己的死亡日期。她于1996年8月11日去世，享年85岁。","verdict_en":"In a 1990 interview, Vanga accurately predicted her own death date. She passed away on August 11, 1996, at the age of 85."},{"id":6,"cat":"climate","q":"万加预言了2022年的干旱和洪水","a":"「大城市将经历干旱和水源短缺，澳大利亚和亚洲将面临严重洪灾。」","q_en":"Vanga predicted 2022 droughts and floods","a_en":"\"Large cities will experience droughts and water shortages; Australia and Asia will face severe floods.\"","year":2022,"status":"verified","verdict_zh":"2022年英国经历了「自1935年以来最干旱的7月」，悉尼在四天内降下了八个月的雨量导致严重洪灾，日本也遭遇了大规模台风洪水。","verdict_en":"In 2022, the UK experienced 'the driest July since 1935', Sydney received eight months of rainfall in four days causing severe flooding, and Japan faced major tropical storm flooding."},{"id":7,"cat":"war","q":"万加预言第三次世界大战","a":"「第三次世界大战将从2010年11月开始，至2014年10月结束。战争最初使用常规武器，之后将使用核武器和化学武器。」","q_en":"Vanga predicted World War Three","a_en":"\"World War Three will start in November 2010 and end in October 2014. It will start with conventional weapons, then nuclear and chemical weapons will be used.\"","year":2010,"status":"failed","verdict_zh":"2010年至2014年间并未爆发第三次世界大战。虽然这段时期有阿拉伯之春和叙利亚内战等冲突，但远未达到世界大战的规模。","verdict_en":"No World War Three occurred between 2010-2014. While there were conflicts like the Arab Spring and Syrian civil war during this period, they were far from a world war."},{"id":8,"cat":"war","q":"2025年欧洲冲突","a":"「欧洲将爆发严重战争冲突，导致大片地区人口稀少。」","q_en"

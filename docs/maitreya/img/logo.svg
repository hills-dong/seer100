<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 28" height="20">
  <!-- Dharmachakra (法轮) - Buddhist Dharma Wheel -->
  <circle cx="14" cy="14" r="11.5" fill="none" stroke="#b08a20" stroke-width="1.8"/>
  <circle cx="14" cy="14" r="3.2" fill="#886818"/>
  <!-- 8 spokes -->
  <line x1="14" y1="2.5" x2="14" y2="10.8" stroke="#886818" stroke-width="1.2"/>
  <line x1="14" y1="17.2" x2="14" y2="25.5" stroke="#886818" stroke-width="1.2"/>
  <line x1="2.5" y1="14" x2="10.8" y2="14" stroke="#886818" stroke-width="1.2"/>
  <line x1="17.2" y1="14" x2="25.5" y2="14" stroke="#886818" stroke-width="1.2"/>
  <line x1="5.87" y1="5.87" x2="11.17" y2="11.17" stroke="#886818" stroke-width="1.2"/>
  <line x1="16.83" y1="16.83" x2="22.13" y2="22.13" stroke="#886818" stroke-width="1.2"/>
  <line x1="22.13" y1="5.87" x2="16.83" y2="11.17" stroke="#886818" stroke-width="1.2"/>
  <line x1="5.87" y1="22.13" x2="11.17" y2="16.83" stroke="#886818" stroke-width="1.2"/>
  <!-- 8 small circles on the rim -->
  <circle cx="14" cy="2.5" r="1.3" fill="#b08a20"/>
  <circle cx="14" cy="25.5" r="1.3" fill="#b08a20"/>
  <circle cx="2.5" cy="14" r="1.3" fill="#b08a20"/>
  <circle cx="25.5" cy="14" r="1.3" fill="#b08a20"/>
  <circle cx="5.87" cy="5.87" r="1.3" fill="#b08a20"/>
  <circle cx="22.13" cy="22.13" r="1.3" fill="#b08a20"/>
  <circle cx="22.13" cy="5.87" r="1.3" fill="#b08a20"/>
  <circle cx="5.87" cy="22.13" r="1.3" fill="#b08a20"/>
  <!-- Text: 弥勒佛 -->
  <text x="32" y="20" font-family="'Noto Serif SC', 'Source Han Serif CN', 'SimSun', Georgia, serif" font-size="18" font-weight="bold" fill="#886818" letter-spacing="2">弥勒佛</text>
</svg>

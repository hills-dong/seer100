<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 28" height="20">
  <!-- Franciscan Tau cross with stigmata dots -->
  <rect x="4" y="4" width="20" height="4" rx="1" fill="#7a6a40"/>
  <rect x="11" y="4" width="6" height="20" rx="1" fill="#7a6a40"/>
  <!-- Stigmata wound marks on the cross -->
  <circle cx="8" cy="6" r="1.2" fill="#5c4e28"/>
  <circle cx="20" cy="6" r="1.2" fill="#5c4e28"/>
  <circle cx="14" cy="19" r="1.2" fill="#5c4e28"/>
  <!-- Text -->
  <text x="32" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#5c4e28" letter-spacing="0.5">PADRE PIO</text>
</svg>

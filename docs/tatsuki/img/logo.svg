<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 28" height="20">
  <!-- Dream bubble with eye icon -->
  <!-- Outer cloud/bubble shape -->
  <circle cx="14" cy="12" r="10" fill="#8c5a6a"/>
  <circle cx="8" cy="14" r="5" fill="#8c5a6a"/>
  <circle cx="20" cy="14" r="5" fill="#8c5a6a"/>
  <circle cx="14" cy="18" r="5" fill="#8c5a6a"/>
  <!-- Small tail of dream bubble -->
  <circle cx="10" cy="23" r="2.2" fill="#8c5a6a"/>
  <circle cx="7" cy="26" r="1.3" fill="#8c5a6a"/>
  <!-- Inner eye - white -->
  <ellipse cx="14" cy="13" rx="5.5" ry="3.8" fill="#f2f0f4"/>
  <!-- Pupil -->
  <circle cx="14" cy="13" r="2" fill="#6a3c4e"/>
  <!-- Eye highlight -->
  <circle cx="15.2" cy="12" r="0.7" fill="#f2f0f4"/>
  <!-- Text -->
  <text x="32" y="20" font-family="'Noto Serif SC', 'Source Han Serif CN', Georgia, serif" font-size="18" font-weight="bold" fill="#6a3c4e" letter-spacing="2">たつき諒</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 28" height="20">
  <!-- Cloud/mist motif: 步虚 = walking on void/clouds -->
  <!-- Main cloud body -->
  <circle cx="14" cy="16" r="6" fill="#6b3a5a"/>
  <circle cx="8" cy="18" r="4.5" fill="#6b3a5a"/>
  <circle cx="20" cy="18" r="4.5" fill="#6b3a5a"/>
  <circle cx="11" cy="13" r="4" fill="#6b3a5a"/>
  <circle cx="17" cy="13" r="4" fill="#6b3a5a"/>
  <!-- Upper wisps -->
  <circle cx="14" cy="10" r="3" fill="#4e2440"/>
  <circle cx="10" cy="11" r="2.5" fill="#4e2440"/>
  <circle cx="18" cy="11" r="2.5" fill="#4e2440"/>
  <!-- Cloud base to flatten bottom -->
  <rect x="3" y="20" width="22" height="6" fill="#f2eef0"/>
  <!-- Small decorative wisps rising -->
  <circle cx="7" cy="9" r="1.5" fill="#4e2440"/>
  <circle cx="21" cy="9" r="1.5" fill="#4e2440"/>
  <!-- Text: 步虚诗 -->
  <text x="32" y="20" font-family="'Noto Serif SC', 'Source Han Serif CN', 'SimSun', Georgia, serif" font-size="18" font-weight="bold" fill="#6b3a5a" letter-spacing="2">步虚诗</text>
</svg>

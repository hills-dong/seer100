<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 28" height="20">
  <!-- DNA double helix morphing into binary code -->
  <!-- Left strand -->
  <path d="M6 3 A8 8 0 0 1 14 9 A8 8 0 0 0 22 15 A8 8 0 0 1 14 21 A8 8 0 0 0 6 27" stroke="#8c6a20" stroke-width="2" fill="none"/>
  <!-- Right strand -->
  <path d="M22 3 A8 8 0 0 0 14 9 A8 8 0 0 1 6 15 A8 8 0 0 0 14 21 A8 8 0 0 1 22 27" stroke="#6a5010" stroke-width="2" fill="none"/>
  <!-- Cross bars (base pairs turning into binary) -->
  <line x1="9" y1="6" x2="19" y2="6" stroke="#8c6a20" stroke-width="1.2"/>
  <line x1="7" y1="10.5" x2="21" y2="10.5" stroke="#8c6a20" stroke-width="1.2"/>
  <line x1="7" y1="15" x2="21" y2="15" stroke="#6a5010" stroke-width="1.2"/>
  <line x1="9" y1="19.5" x2="19" y2="19.5" stroke="#6a5010" stroke-width="1"/>
  <line x1="7" y1="24" x2="21" y2="24" stroke="#6a5010" stroke-width="0.8"/>
  <!-- Binary dots (transition from biology to digital) -->
  <circle cx="24" cy="8" r="1" fill="#8c6a20"/>
  <circle cx="24" cy="12" r="1" fill="#6a5010"/>
  <circle cx="24" cy="20" r="0.8" fill="#6a5010"/>
  <!-- Text -->
  <text x="32" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#6a5010" letter-spacing="0.5">HARARI</text>
</svg>

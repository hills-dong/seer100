  <!-- Handles -->
  <path d="M8 10 Q4 10 4 14 Q4 18 8 18" fill="none" stroke="#5a5a3a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M20 10 Q24 10 24 14 Q24 18 20 18" fill="none" stroke="#5a5a3a" stroke-width="1.8" stroke-linecap="round"/>

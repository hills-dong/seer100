<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 28" height="20">
  <!-- Lotus flower symbol -->
  <!-- Center petal -->
  <path d="M14,4 Q16,10 14,14 Q12,10 14,4 Z" fill="#8c7a2e"/>
  <!-- Left petals -->
  <path d="M10,6 Q13,11 12,15 Q9,11 10,6 Z" fill="#8c7a2e"/>
  <path d="M6,9 Q10,12 10,16 Q6,13 6,9 Z" fill="#6a5a18"/>
  <!-- Right petals -->
  <path d="M18,6 Q15,11 16,15 Q19,11 18,6 Z" fill="#8c7a2e"/>
  <path d="M22,9 Q18,12 18,16 Q22,13 22,9 Z" fill="#6a5a18"/>
  <!-- Base / seed pod -->
  <circle cx="14" cy="17" r="3.5" fill="#6a5a18"/>
  <circle cx="14" cy="17" r="2.2" fill="#f2f0e6"/>
  <circle cx="14" cy="17" r="1.2" fill="#6a5a18"/>
  <!-- Bottom leaves -->
  <path d="M8,20 Q11,18 14,20 Q11,22 8,20 Z" fill="#8c7a2e"/>
  <path d="M20,20 Q17,18 14,20 Q17,22 20,20 Z" fill="#8c7a2e"/>
  <!-- Outer circle -->
  <circle cx="14" cy="14" r="12" fill="none" stroke="#8c7a2e" stroke-width="0.8"/>
  <!-- Text: 黄蘖诗 -->
  <text x="32" y="20" font-family="'Noto Serif SC', 'Source Han Serif CN', 'SimSun', Georgia, serif" font-size="18" font-weight="bold" fill="#6a5a18" letter-spacing="2">黄蘖诗</text>
</svg>

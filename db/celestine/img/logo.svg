<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 28" height="20">
  <!-- Ancient manuscript scroll icon -->
  <!-- Scroll body -->
  <rect x="6" y="4" width="16" height="20" rx="1.5" fill="#5a6a5a"/>
  <!-- Top roll -->
  <ellipse cx="14" cy="4" rx="9" ry="2.5" fill="#3e4e3e"/>
  <!-- Bottom roll -->
  <ellipse cx="14" cy="24" rx="9" ry="2.5" fill="#3e4e3e"/>
  <!-- Text lines on scroll -->
  <line x1="9" y1="9" x2="19" y2="9" stroke="#f0f4f2" stroke-width="1" stroke-linecap="round"/>
  <line x1="9" y1="12.5" x2="19" y2="12.5" stroke="#f0f4f2" stroke-width="1" stroke-linecap="round"/>
  <line x1="9" y1="16" x2="17" y2="16" stroke="#f0f4f2" stroke-width="1" stroke-linecap="round"/>
  <line x1="9" y1="19.5" x2="19" y2="19.5" stroke="#f0f4f2" stroke-width="1" stroke-linecap="round"/>
  <!-- Glow/light rays -->
  <path d="M22 8 L26 5" stroke="#3e4e3e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M24 14 L28 14" stroke="#3e4e3e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M22 20 L26 23" stroke="#3e4e3e" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Text -->
  <text x="32" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#3e4e3e" letter-spacing="0.5">CELESTINE</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 28" height="20">
  <!-- Samtaegeuk (삼태극, triple taegeuk) - Korean traditional motif -->
  <!-- Outer circle -->
  <circle cx="14" cy="14" r="12" fill="#8c6b5a" stroke="#6a4e3e" stroke-width="0.8"/>
  <!-- Three swirling sections using arcs -->
  <!-- Section 1: top, bg color -->
  <path d="M14,2 A12,12 0 0,1 24.392,20 A6,6 0 0,0 14,14 A6,6 0 0,1 14,2" fill="#f0eeee"/>
  <!-- Section 2: bottom-right, primaryDark -->
  <path d="M24.392,20 A12,12 0 0,1 3.608,20 A6,6 0 0,0 14,14 A6,6 0 0,1 24.392,20" fill="#6a4e3e"/>
  <!-- Section 3: bottom-left, primary (already the bg circle color) -->
  <!-- The remaining section is the original circle fill #8c6b5a -->
  <!-- Center dot -->
  <circle cx="14" cy="14" r="1.5" fill="#f0eeee"/>
  <!-- Three small dots in each section -->
  <circle cx="14" cy="6" r="1.5" fill="#8c6b5a"/>
  <circle cx="20" cy="19" r="1.5" fill="#f0eeee"/>
  <circle cx="8" cy="19" r="1.5" fill="#6a4e3e"/>
  <!-- Text: 格庵录 -->
  <text x="32" y="20" font-family="'Noto Serif SC', 'Source Han Serif CN', 'SimSun', Georgia, serif" font-size="18" font-weight="bold" fill="#6a4e3e" letter-spacing="2">格庵录</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 28" height="20">
  <!-- Abacus (算盘) symbol -->
  <!-- Outer frame -->
  <rect x="3" y="2" width="22" height="24" rx="1.5" fill="none" stroke="#6b6b3a" stroke-width="1.5"/>
  <!-- Horizontal beam (dividing bar) -->
  <line x1="3" y1="10" x2="25" y2="10" stroke="#6b6b3a" stroke-width="1.2"/>
  <!-- Vertical rods -->
  <line x1="9" y1="2" x2="9" y2="26" stroke="#4e4e24" stroke-width="0.7"/>
  <line x1="14" y1="2" x2="14" y2="26" stroke="#4e4e24" stroke-width="0.7"/>
  <line x1="19" y1="2" x2="19" y2="26" stroke="#4e4e24" stroke-width="0.7"/>
  <!-- Upper beads (heaven beads, 1 per rod) -->
  <circle cx="9" cy="6.5" r="2" fill="#6b6b3a"/>
  <circle cx="14" cy="5.5" r="2" fill="#4e4e24"/>
  <circle cx="19" cy="6.5" r="2" fill="#6b6b3a"/>
  <!-- Lower beads (earth beads, 2 per rod) -->
  <circle cx="9" cy="14.5" r="2" fill="#4e4e24"/>
  <circle cx="9" cy="19.5" r="2" fill="#6b6b3a"/>
  <circle cx="14" cy="14.5" r="2" fill="#6b6b3a"/>
  <circle cx="14" cy="19.5" r="2" fill="#4e4e24"/>
  <circle cx="19" cy="16" r="2" fill="#4e4e24"/>
  <circle cx="19" cy="21" r="2" fill="#6b6b3a"/>
  <!-- Text: 铁板数 -->
  <text x="32" y="20" font-family="'Noto Serif SC', 'Source Han Serif CN', 'SimSun', Georgia, serif" font-size="18" font-weight="bold" fill="#4e4e24" letter-spacing="2">铁板数</text>
</svg>

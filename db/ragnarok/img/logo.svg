  <path d="M14 24 Q20 26 24 24" stroke="#3e5a6a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M14 22 Q9 24 6 21" stroke="#3e5a6a" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M14 22 Q19 24 22 21" stroke="#3e5a6a" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Crown / canopy -->

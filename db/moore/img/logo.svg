<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 28" height="20">
  <!-- Microchip icon: square body with pins -->
  <!-- Chip body -->
  <rect x="6" y="6" width="16" height="16" rx="1.5" fill="#8c8040"/>
  <!-- Inner die -->
  <rect x="9.5" y="9.5" width="9" height="9" rx="0.5" fill="#6a6028"/>
  <!-- Die marking dot -->
  <circle cx="11.5" cy="11.5" r="1" fill="#8c8040"/>
  <!-- Pins - top -->
  <rect x="10" y="2" width="2" height="4" rx="0.5" fill="#6a6028"/>
  <rect x="16" y="2" width="2" height="4" rx="0.5" fill="#6a6028"/>
  <!-- Pins - bottom -->
  <rect x="10" y="22" width="2" height="4" rx="0.5" fill="#6a6028"/>
  <rect x="16" y="22" width="2" height="4" rx="0.5" fill="#6a6028"/>
  <!-- Pins - left -->
  <rect x="2" y="10" width="4" height="2" rx="0.5" fill="#6a6028"/>
  <rect x="2" y="16" width="4" height="2" rx="0.5" fill="#6a6028"/>
  <!-- Pins - right -->
  <rect x="22" y="10" width="4" height="2" rx="0.5" fill="#6a6028"/>
  <rect x="22" y="16" width="4" height="2" rx="0.5" fill="#6a6028"/>
  <!-- Text -->
  <text x="32" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#6a6028" letter-spacing="0.5">MOORE</text>
</svg>

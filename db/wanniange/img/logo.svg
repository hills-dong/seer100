<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 28" height="20">
  <!-- Trigram symbol (乾卦 / Qian trigram - three solid lines representing heaven) -->
  <!-- Top line -->
  <line x1="4" y1="6" x2="24" y2="6" stroke="#2a6b5c" stroke-width="3" stroke-linecap="round"/>
  <!-- Middle line (broken - representing 坤/earth) -->
  <line x1="4" y1="14" x2="11" y2="14" stroke="#1a4e40" stroke-width="3" stroke-linecap="round"/>
  <line x1="17" y1="14" x2="24" y2="14" stroke="#1a4e40" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom line -->
  <line x1="4" y1="22" x2="24" y2="22" stroke="#2a6b5c" stroke-width="3" stroke-linecap="round"/>
  <!-- Text: 万年歌 -->
  <text x="32" y="20" font-family="'Noto Serif SC', 'Source Han Serif CN', 'SimSun', Georgia, serif" font-size="18" font-weight="bold" fill="#1a4e40" letter-spacing="2">万年歌</text>
</svg>

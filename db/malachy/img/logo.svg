<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 142 28" height="20">
  <!-- Papal Tiara (Triple Crown) -->
  <!-- Base crown band -->
  <path d="M8 20 L20 20 L19 17 L9 17 Z" fill="#8c7040"/>
  <!-- Middle tier -->
  <path d="M9 17 L19 17 L18 13 L10 13 Z" fill="#6a5228"/>
  <!-- Top tier -->
  <path d="M10 13 L18 13 L16.5 9 L11.5 9 Z" fill="#8c7040"/>
  <!-- Dome top -->
  <path d="M11.5 9 Q14 4 16.5 9" fill="#6a5228"/>
  <!-- Cross on top -->
  <path d="M13.5 5 L14.5 5 L14.5 2 L13.5 2 Z" fill="#8c7040"/>
  <path d="M12.5 3.5 L15.5 3.5 L15.5 3 L12.5 3 Z" fill="#8c7040"/>
  <!-- Crown bands (horizontal lines) -->
  <path d="M9.3 16 L18.7 16 L18.8 15.4 L9.2 15.4 Z" fill="#f4f2ee"/>
  <path d="M10.3 12 L17.7 12 L17.8 11.4 L10.2 11.4 Z" fill="#f4f2ee"/>
  <!-- Lappets (ribbons hanging down) -->
  <path d="M10 20 Q9 24 8.5 25" stroke="#8c7040" stroke-width="1.2" fill="none"/>
  <path d="M18 20 Q19 24 19.5 25" stroke="#8c7040" stroke-width="1.2" fill="none"/>
  <!-- Text -->
  <text x="32" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="bold" fill="#6a5228" letter-spacing="0.5">MALACHY</text>
</svg>

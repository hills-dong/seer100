<div class="verify-item verified"><div class="verify-header"><span class="prophecy-id">#2</span> <span class="status-badge verified">✅ Verified</span> <span class="verify-year">Predicted Year: 2000</span></div><div class="verify-body"><div class="verify-prophecy"><div class="verify-q">In 1980, Vanga mentioned Kursk</div><div class="verify-a"><strong>Baba Vanga:</strong> &quot;In August 1999, Kursk will be covered with water, and the whole world will weep over it.&quot;</div></div><div><div class="verify-verdict">People assumed she meant the city of Kursk. But on August 12, 2000, the Russian nuclear submarine 'Kursk' sank in the Barents Sea, killing all 118 crew members. The timing was off by about one year, but the event details match remarkably.</div></div></div></div>

on, and the evolution of human civilization.","homeIntro3":"Some of Vanga's predictions have been confirmed by real events, including the 9/11 attacks, the Kursk submarine disaster, and Obama's presidency. She is often called the 'Bulgarian Nostradamus'. This site compiles 85 of her prophecies and evaluates those whose deadlines have passed.","coreMessage":"Core Message","coreQuote":"\"Everything will melt like ice, yet the glory of Vladimir, the glory of Russia, shall remain intact... Everything will pass, but the glory of Vladimir shall endure.\"","keyPoints":"Key Timeline","kp2019":"2025 — War erupts in Europe, sparse population","kp2035":"2028 — New energy source discovered, world hunger eliminated","kp2038":"2130 — Underwater civilizations built with alien help","kp2048":"3797 — All life on Earth disappears, humans colonize new solar system","kp2060":"5079 — End of the world","allTitle":"All Prophecies","allSubtitle":"{count} predictions in total","searchPlaceholder":"Search prophecies...","filterAll":"All","verifyTitle":"Prophecy Verification","verifySubtitle":"Evaluating predictions against reality for expired time points","statsTotal":"Total","statsVerified":"Verified","statsPartial":"Partial","statsFailed":"Failed","statsPending":"Pending","hitRate":"Hit Rate","realityLabel":"Reality Check","prophecyLabel":"Prophecy","yearLabel":"Predicted Year","footerNote":"Content compiled from public sources, for reference and discussion only. Many of Baba Vanga's predictions cannot be traced to reliable first-hand sources and some may be later attributions. Evaluations represent editorial opinions.","footerSource":"Reference Source"}};

const PROPHECIES = [{"id":1,"cat":"history","q":"1989年，万加对美国发出警告","a":"「恐怖啊，恐怖！美国的兄弟将在钢铁之鸟的攻击下倒塌。丛林中的狼群将嚎叫。无辜者的鲜血将四处喷溅。」","q_en":"In 1989, Vanga warned about America","a_en":"\"Horror, horror! The American brethren will fall after being attacked by the steel birds. The wolves will be howling in the bush. Innocent blood will gush.\"","year":2001,"status":"verified","verdict_zh":"2001年9月11日，两架被劫持的客机（钢铁之鸟）撞击纽约世贸中心双子塔（美国兄弟），造成近3000人死亡。这是万加最广为人知的应验预言。","verdict_en":"On September 11, 2001, two hijacked planes ('steel birds') struck the Twin Towers ('American brethren') of the World Trade Center in New York, killing nearly 3,000 people. This is Vanga's most widely cited fulfilled prediction."},{"id":2,"cat":"history","q":"1980年，万加提到库尔斯克","a":"「在1999年8月，库尔斯克将被淹没在水下，整个世界都会为之哀悼。」","q_en":"In 1980, Vanga mentioned Kursk","a_en":"\"In August 1999, Kursk will be covered with water, and the whole world will weep over it.\"","year":2000,"status":"verified","verdict_zh":"当时人们以为她说的是库尔斯克市。但2000年8月12日，俄罗斯核潜艇「库尔斯克号」在巴伦支海沉没，118名船员全部遇难。时间差了约一年，但事件细节高度吻合。","verdict_en":"People assumed she meant the city of Kursk. But on August 12, 2000, the Russian nuclear submarine 'Kursk' sank in the Barents Sea, killing all 118 crew members. The timing was off by about one year, but the event details match remarkably."},{"id":3,"cat":"history","q":"万加曾预言美国第44任总统","a":"「第44任美国总统将是一位非裔美国人。但他也将是最后一位总统。」","q_en":"Vanga predicted the 44th US president","a_en":"\"The 44th American president will be a Black man. But he will also be the last president.\"","year":2008,"status":"partial","verdict_zh":"2008年巴拉克·奥巴马当选美国第44任总统，确实是首位非裔总统。但「最后一位总统」的说法并未应验，美国此后继续有新总统当选。","verdict_en":"Barack Obama was elected 44th US president in 2008, indeed the first African-American president. However, the claim of being 'the last president' did not come true, as the US has continued to elect new presidents."},{"id":4,"cat":"history","q":"1969年，万加对印度总理英迪拉·甘地发出警告","a":"「裙子会毁了她。我在烟火中看见一件橙黄色的裙子。」","q_en":"In 1969, Vanga warned Indian PM Indira Gandhi","a_en":"\"The dress will destroy her. I see an orange-yellow dress in the smoke and fire.\"","year":1984,"status":"verified","verdict_zh":"1984年10月31日，英迪拉·甘地遭锡克教卫士刺杀身亡时，身穿一件藏红色（橙黄色）纱丽。","verdict_en":"On October 31, 1984, Indira Gandhi was assassinated by her Sikh bodyguards. She was wearing a saffron-hued (orange-yellow) saree at the time of her death."},{"id":5,"cat":"history","q":"万加预言自己的死亡日期","a":"「我将在1996年8月11日离开。」","q_en":"Vanga predicted her own death","a_en":"\"I will depart on August 11, 1996.\"","year":1996,"status":"verified","verdict_zh":"万加在1990年的一次采访中准确预言了自己的死亡日期。她于1996年8月11日去世，享年85岁。","verdict_en":"In a 1990 interview, Vanga accurately predicted her own death date. She passed away on August 11, 1996, at the age of 85."},{"id":6,"cat":"history","q":"万加预言了2022年的干旱和洪水","a":"「大城市将经历干旱和水源短缺，澳大利亚和亚洲将面临严重洪灾。」","q_en":"Vanga predicted 2022 droughts and floods","a_en":"\"Large cities will experience droughts and water shortages; Australia and Asia will face severe floods.\"","year":2022,"status":"verified","verdict_zh":"2022年英国经历了「自1935年以来最干旱的7月」，悉尼在四天内降下了八个月的雨量导致严重洪灾，日本也遭遇了大规模台风洪水。","verdict_en":"In 2022, the UK experienced 'the driest July since 1935', Sydney received eight months of rainfall in four days causing severe flooding, and Japan faced major tropical storm flooding."},{"id":7,"cat":"war","q":"万加预言第三次世界大战","a":"「第三次世界大战将从2010年11月开始，至2014年10月结束。战争最初使用常规武器，之后将使用核武器和化学武器。」","q_en":"Vanga predicted World War Three","a_en":"\"World War Three will start in November 2010 and end in October 2014. It will start with conventional weapons, then nuclear and chemical weapons will be used.\"","year":2010,"status":"failed","verdict_zh":"2010年至2014年间并未爆发第三次世界大战。虽然这段时期有阿拉伯之春和叙利亚内战等冲突，但远未达到世界大战的规模。","verdict_en":"No World War Three occurred between 2010-2014. While there were conflicts like the Arab Spring and Syrian civil war during this period, they were far from a world war."},{"id":8,"cat":"war","q":"2025年欧洲冲突","a":"「欧洲将爆发严重战争冲突，导致大片地区人口稀少。」","q_
